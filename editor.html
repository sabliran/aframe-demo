<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Model Editor</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .editor-container {
      max-width: 450px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .header {
      background: #2C3E50;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin: 5px 0 0 0;
      opacity: 0.8;
      font-size: 14px;
    }

    .content {
      padding: 20px;
    }

    .section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid #ecf0f1;
    }

    .section:last-child {
      border-bottom: none;
    }

    .section h2 {
      margin: 0 0 15px 0;
      color: #2C3E50;
      font-size: 18px;
      display: flex;
      align-items: center;
    }

    .section h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 20px;
      background: #667eea;
      margin-right: 10px;
      border-radius: 2px;
    }

    .file-upload-area {
      border: 3px dashed #bdc3c7;
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      background: #f8f9fa;
      cursor: pointer;
      transition: all 0.3s;
    }

    .file-upload-area:hover {
      border-color: #667eea;
      background: #f0f0ff;
    }

    .file-upload-area.drag-over {
      border-color: #667eea;
      background: #e8e8ff;
      transform: scale(1.02);
    }

    .file-upload-area input {
      display: none;
    }

    .upload-icon {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .upload-text {
      color: #7f8c8d;
      font-size: 14px;
    }

    .file-info {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
    }

    .file-info.active {
      display: block;
    }

    .file-info strong {
      color: #27ae60;
    }

    .control-group {
      margin-bottom: 15px;
    }

    .control-group label {
      display: block;
      margin-bottom: 5px;
      color: #34495e;
      font-weight: 600;
      font-size: 14px;
    }

    .control-group select,
    .control-group input[type="color"] {
      width: 100%;
      padding: 10px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    .control-group select:focus,
    .control-group input:focus {
      outline: none;
      border-color: #667eea;
    }

    .position-inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .position-inputs input {
      padding: 10px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      text-align: center;
      font-size: 14px;
    }

    .position-inputs input:focus {
      outline: none;
      border-color: #667eea;
    }

    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-container input[type="range"] {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: #ecf0f1;
      outline: none;
      -webkit-appearance: none;
    }

    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
    }

    .slider-container input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
    }

    .slider-value {
      min-width: 50px;
      text-align: center;
      font-weight: 600;
      color: #667eea;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-bottom: 10px;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }

    .btn-danger {
      background: #e74c3c;
      color: white;
    }

    .btn-danger:hover {
      background: #c0392b;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
    }

    .models-list {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 15px;
    }

    .model-item {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .model-item-name {
      flex: 1;
      font-size: 14px;
      color: #2C3E50;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .model-item-remove {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.3s;
    }

    .model-item-remove:hover {
      background: #c0392b;
    }

    .status-message {
      background: #d4edda;
      color: #155724;
      padding: 12px;
      border-radius: 8px;
      margin-top: 15px;
      display: none;
      border: 1px solid #c3e6cb;
    }

    .status-message.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      border-color: #f5c6cb;
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <div class="header">
      <h1>🎨 VR Model Editor</h1>
      <p>Add 3D models to your VR scene</p>
    </div>

    <div class="content">
      <!-- File Upload Section -->
      <div class="section">
        <h2>Upload Model</h2>
        <div class="file-upload-area" id="dropArea">
          <input type="file" id="fileInput" accept=".stl,.obj,.gltf,.glb">
          <div class="upload-icon">📦</div>
          <div class="upload-text">
            <strong>Click to browse</strong> or drag & drop<br>
            <small>STL, OBJ, GLTF, GLB files supported</small>
          </div>
        </div>
        <div class="file-info" id="fileInfo">
          <strong>Selected:</strong> <span id="fileName"></span>
        </div>
      </div>

      <!-- Model Settings Section -->
      <div class="section">
        <h2>Model Settings</h2>
        
        <div class="control-group">
          <label>Target Room</label>
          <select id="roomSelect">
            <option value="room1">🔵 Blue Room</option>
            <option value="room2">🟢 Green Room</option>
            <option value="room3">🔴 Red Room</option>
          </select>
        </div>

        <div class="control-group">
          <label>Position (X, Y, Z)</label>
          <div class="position-inputs">
            <input type="number" id="posX" value="0" step="0.1" placeholder="X">
            <input type="number" id="posY" value="1" step="0.1" placeholder="Y">
            <input type="number" id="posZ" value="-3" step="0.1" placeholder="Z">
          </div>
        </div>

        <div class="control-group">
          <label>Scale</label>
          <div class="slider-container">
            <input type="range" id="scaleSlider" min="0.1" max="5" step="0.1" value="1">
            <span class="slider-value" id="scaleValue">1.0</span>
          </div>
        </div>

        <div class="control-group">
          <label>Rotation (Y-axis degrees)</label>
          <div class="slider-container">
            <input type="range" id="rotationSlider" min="0" max="360" step="15" value="0">
            <span class="slider-value" id="rotationValue">0°</span>
          </div>
        </div>

        <div class="control-group">
          <label>Color</label>
          <input type="color" id="colorPicker" value="#ffffff">
        </div>
      </div>

      <!-- Actions Section -->
      <div class="section">
        <h2>Actions</h2>
        <button class="btn-primary" id="addModelBtn" disabled>Add Model to Scene</button>
        <button class="btn-danger" id="clearAllBtn">Clear All Models</button>
        
        <div class="status-message" id="statusMessage"></div>
      </div>

      <!-- Loaded Models Section -->
      <div class="section">
        <h2>Loaded Models</h2>
        <div class="models-list" id="modelsList">
          <p style="color: #7f8c8d; text-align: center; font-size: 14px;">No models loaded yet</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentFile = null;
    let loadedModels = [];

    // Get elements
    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const addModelBtn = document.getElementById('addModelBtn');
    const clearAllBtn = document.getElementById('clearAllBtn');
    const scaleSlider = document.getElementById('scaleSlider');
    const scaleValue = document.getElementById('scaleValue');
    const rotationSlider = document.getElementById('rotationSlider');
    const rotationValue = document.getElementById('rotationValue');
    const statusMessage = document.getElementById('statusMessage');
    const modelsList = document.getElementById('modelsList');

    // File upload handlers
    dropArea.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => {
      handleFile(e.target.files[0]);
    });

    // Drag and drop
    dropArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropArea.classList.add('drag-over');
    });

    dropArea.addEventListener('dragleave', () => {
      dropArea.classList.remove('drag-over');
    });

    dropArea.addEventListener('drop', (e) => {
      e.preventDefault();
      dropArea.classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;

      const validExtensions = ['stl', 'obj', 'gltf', 'glb'];
      const extension = file.name.split('.').pop().toLowerCase();

      if (!validExtensions.includes(extension)) {
        showStatus('Invalid file type. Please use STL, OBJ, GLTF, or GLB files.', true);
        return;
      }

      currentFile = file;
      fileName.textContent = file.name;
      fileInfo.classList.add('active');
      addModelBtn.disabled = false;
      showStatus('File loaded successfully!', false);
    }

    // Slider updates
    scaleSlider.addEventListener('input', (e) => {
      scaleValue.textContent = e.target.value;
    });

    rotationSlider.addEventListener('input', (e) => {
      rotationValue.textContent = e.target.value + '°';
    });

    // Add model button
    addModelBtn.addEventListener('click', () => {
      if (!currentFile) return;

      const reader = new FileReader();
      reader.onload = (e) => {
        const modelData = {
          fileData: e.target.result,
          fileName: currentFile.name,
          fileType: currentFile.name.split('.').pop().toLowerCase()
        };

        const settings = {
          room: document.getElementById('roomSelect').value,
          position: {
            x: parseFloat(document.getElementById('posX').value),
            y: parseFloat(document.getElementById('posY').value),
            z: parseFloat(document.getElementById('posZ').value)
          },
          scale: parseFloat(scaleSlider.value),
          rotationY: parseFloat(rotationSlider.value),
          color: document.getElementById('colorPicker').value
        };

        // Send to parent window
        if (window.opener) {
          window.opener.postMessage({
            type: 'ADD_MODEL',
            modelData: modelData,
            ...settings
          }, '*');
          showStatus('Model sent to VR scene!', false);
        } else {
          showStatus('Please open this editor from the VR scene window.', true);
        }
      };

      reader.readAsArrayBuffer(currentFile);
    });

    // Clear all button
    clearAllBtn.addEventListener('click', () => {
      if (confirm('Are you sure you want to remove all models from the scene?')) {
        if (window.opener) {
          window.opener.postMessage({ type: 'CLEAR_ALL' }, '*');
          loadedModels = [];
          updateModelsList();
          showStatus('All models cleared!', false);
        }
      }
    });

    // Listen for messages from main window
    window.addEventListener('message', (event) => {
      if (event.data.type === 'MODEL_ADDED') {
        loadedModels.push({
          id: event.data.modelId,
          name: event.data.fileName
        });
        updateModelsList();
      }
    });

    // Update models list
    function updateModelsList() {
      if (loadedModels.length === 0) {
        modelsList.innerHTML = '<p style="color: #7f8c8d; text-align: center; font-size: 14px;">No models loaded yet</p>';
        return;
      }

      modelsList.innerHTML = '';
      loadedModels.forEach(model => {
        const item = document.createElement('div');
        item.className = 'model-item';
        item.innerHTML = `
          <span class="model-item-name">${model.name}</span>
          <button class="model-item-remove" onclick="removeModel('${model.id}')">Remove</button>
        `;
        modelsList.appendChild(item);
      });
    }

    // Remove model
    function removeModel(modelId) {
      if (window.opener) {
        window.opener.postMessage({
          type: 'REMOVE_MODEL',
          modelId: modelId
        }, '*');
        
        loadedModels = loadedModels.filter(m => m.id !== modelId);
        updateModelsList();
        showStatus('Model removed!', false);
      }
    }

    // Show status message
    function showStatus(message, isError) {
      statusMessage.textContent = message;
      statusMessage.classList.add('active');
      if (isError) {
        statusMessage.classList.add('error');
      } else {
        statusMessage.classList.remove('error');
      }

      setTimeout(() => {
        statusMessage.classList.remove('active');
      }, 3000);
    }

    // Check if opened from parent window
    if (!window.opener) {
      showStatus('⚠️ Please open this editor from the VR scene window using the "Open Editor" button.', true);
      addModelBtn.disabled = true;
    }
  </script>
</body>
</html>
