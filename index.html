<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Room Viewer</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    /* Info panel */
    #info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(44, 62, 80, 0.9);
      padding: 15px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      z-index: 1000;
    }

    #info-panel h3 {
      margin: 0 0 10px 0;
      color: #4CC3D9;
    }

    #info-panel button {
      background: #4CC3D9;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    #info-panel button:hover { background: #3AB0C7; }

    /* Editor panel */
    #editor-panel {
      position: fixed;
      top: 0;
      right: -470px;
      width: 450px;
      height: 100vh;
      overflow-y: auto;
      z-index: 2000;
      transition: right 0.3s ease;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    #editor-panel.open { right: 0; }

    .editor-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .editor-header {
      background: #2C3E50;
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
    }

    .editor-header h1 { margin: 0; font-size: 22px; }
    .editor-header p { margin: 5px 0 0; opacity: 0.8; font-size: 13px; }

    #close-editor {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
    }

    #close-editor:hover { background: rgba(255,255,255,0.35); }

    .editor-content { padding: 20px; }

    .section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid #ecf0f1;
    }

    .section:last-child { border-bottom: none; margin-bottom: 0; }

    .section h2 {
      margin: 0 0 15px;
      color: #2C3E50;
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    .section h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: #667eea;
      margin-right: 10px;
      border-radius: 2px;
    }

    .file-upload-area {
      border: 3px dashed #bdc3c7;
      border-radius: 10px;
      padding: 25px;
      text-align: center;
      background: #f8f9fa;
      cursor: pointer;
      transition: all 0.3s;
    }

    .file-upload-area:hover, .file-upload-area.drag-over {
      border-color: #667eea;
      background: #f0f0ff;
    }

    .file-upload-area input { display: none; }
    .upload-icon { font-size: 40px; margin-bottom: 8px; }
    .upload-text { color: #7f8c8d; font-size: 13px; }

    .file-info {
      background: #e8f5e9;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
      font-size: 13px;
    }

    .file-info.active { display: block; }
    .file-info strong { color: #27ae60; }

    .control-group { margin-bottom: 12px; }

    .control-group label {
      display: block;
      margin-bottom: 4px;
      color: #34495e;
      font-weight: 600;
      font-size: 13px;
    }

    .control-group select,
    .control-group input[type="color"] {
      width: 100%;
      padding: 9px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      font-size: 13px;
    }

    .position-inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .position-inputs input {
      padding: 9px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      width: 100%;
    }

    .slider-container { display: flex; align-items: center; gap: 10px; }

    .slider-container input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ecf0f1;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
    }

    .slider-container input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
    }

    .slider-value { min-width: 45px; text-align: center; font-weight: 600; color: #667eea; font-size: 13px; }

    #editor-panel button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-bottom: 10px;
    }

    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .btn-primary:disabled { background: #95a5a6; cursor: not-allowed; }

    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; transform: translateY(-1px); }

    .models-list { max-height: 180px; overflow-y: auto; margin-top: 12px; }

    .model-item {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .model-item-name {
      flex: 1;
      font-size: 13px;
      color: #2C3E50;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .model-item-remove {
      background: #e74c3c !important;
      color: white;
      border: none;
      padding: 5px 10px !important;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      width: auto !important;
      margin-bottom: 0 !important;
    }

    .model-item-remove:hover { background: #c0392b !important; transform: none !important; }

    .status-message {
      background: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
      font-size: 13px;
      border: 1px solid #c3e6cb;
    }

    .status-message.active { display: block; }
    .status-message.error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
  </style>
</head>
<body>

  <div id="info-panel">
    <h3>VR Room Viewer</h3>
    <button onclick="toggleEditor()">Editor</button>
  </div>

  <div id="editor-panel">
    <div class="editor-container">
      <div class="editor-header">
        <button id="close-editor" onclick="toggleEditor()">&#x2715;</button>
        <h1>3D Model Editor</h1>
        <p>Add models to your VR scene</p>
      </div>
      <div class="editor-content">

        <div class="section">
          <h2>Upload Model</h2>
          <div class="file-upload-area" id="dropArea">
            <input type="file" id="fileInput" accept=".stl,.obj,.gltf,.glb">
            <div class="upload-icon">📦</div>
            <div class="upload-text">
              <strong>Click to browse</strong> or drag & drop<br>
              <small>STL, OBJ, GLTF, GLB supported</small>
            </div>
          </div>
          <div class="file-info" id="fileInfo">
            <strong>Selected:</strong> <span id="fileName"></span>
          </div>
        </div>

        <div class="section">
          <h2>Model Settings</h2>
          <div class="control-group">
            <label>Target Room</label>
            <select id="roomSelect">
              <option value="room1">Bleeue Room</option>
              <option value="room2">Green Room</option>
              <option value="room3">Red Room</option>
            </select>
          </div>
          <div class="control-group">
            <label>Position (X, Y, Z)</label>
            <div class="position-inputs">
              <input type="number" id="posX" value="0" step="0.1" placeholder="X">
              <input type="number" id="posY" value="1" step="0.1" placeholder="Y">
              <input type="number" id="posZ" value="-3" step="0.1" placeholder="Z">
            </div>
          </div>
          <div class="control-group">
            <label>Scale</label>
            <div class="slider-container">
              <input type="range" id="scaleSlider" min="0.1" max="5" step="0.1" value="1">
              <span class="slider-value" id="scaleValue">1.0</span>
            </div>
          </div>
          <div class="control-group">
            <label>Rotation Y</label>
            <div class="slider-container">
              <input type="range" id="rotationSlider" min="0" max="360" step="15" value="0">
              <span class="slider-value" id="rotationValue">0°</span>
            </div>
          </div>
          <div class="control-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#ffffff">
          </div>
        </div>

        <div class="section">
          <h2>Actions</h2>
          <button class="btn-primary" id="addModelBtn" disabled>Add to Scene</button>
          <button class="btn-danger" id="clearAllBtn">Clear All Models</button>
          <div class="status-message" id="statusMessage"></div>
        </div>

        <div class="section">
          <h2>Loaded Models</h2>
          <div class="models-list" id="modelsList">
            <p style="color:#7f8c8d;text-align:center;font-size:13px;">No models loaded yet</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <a-scene>
    <a-camera position="0 1.6 0"></a-camera>

    <a-sky id="sky" color="#87CEEB"></a-sky>

    <!-- Room 1: Blue -->
    <a-entity id="room1" visible="true">
      <a-plane class="floor" position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#4682B4"></a-plane>
      <a-box position="0 2 -5"  width="10" height="4" depth="0.2" color="#5B9BD5"></a-box>
      <a-box position="5 2 0"   rotation="0 90 0" width="10" height="4" depth="0.2" color="#5B9BD5"></a-box>
      <a-box position="-5 2 0"  rotation="0 90 0" width="10" height="4" depth="0.2" color="#5B9BD5"></a-box>
      <a-box position="0 2 5"   width="10" height="4" depth="0.2" color="#5B9BD5"></a-box>
      <a-text value="BLUE ROOM" position="0 3 -4.8" align="center" color="#FFF" width="8"></a-text>
      <a-entity id="room1-models"></a-entity>
    </a-entity>

    <!-- Room 2: Green -->
    <a-entity id="room2" visible="false">
      <a-plane class="floor" position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#228B22"></a-plane>
      <a-box position="0 2 -5"  width="10" height="4" depth="0.2" color="#32CD32"></a-box>
      <a-box position="5 2 0"   rotation="0 90 0" width="10" height="4" depth="0.2" color="#32CD32"></a-box>
      <a-box position="-5 2 0"  rotation="0 90 0" width="10" height="4" depth="0.2" color="#32CD32"></a-box>
      <a-box position="0 2 5"   width="10" height="4" depth="0.2" color="#32CD32"></a-box>
      <a-text value="GREEN ROOM" position="0 3 -4.8" align="center" color="#FFF" width="8"></a-text>
      <a-entity id="room2-models"></a-entity>
    </a-entity>

    <!-- Room 3: Red -->
    <a-entity id="room3" visible="false">
      <a-plane class="floor" position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#8B0000"></a-plane>
      <a-box position="0 2 -5"  width="10" height="4" depth="0.2" color="#DC143C"></a-box>
      <a-box position="5 2 0"   rotation="0 90 0" width="10" height="4" depth="0.2" color="#DC143C"></a-box>
      <a-box position="-5 2 0"  rotation="0 90 0" width="10" height="4" depth="0.2" color="#DC143C"></a-box>
      <a-box position="0 2 5"   width="10" height="4" depth="0.2" color="#DC143C"></a-box>
      <a-text value="RED ROOM" position="0 3 -4.8" align="center" color="#FFF" width="8"></a-text>
      <a-entity id="room3-models"></a-entity>
    </a-entity>

    <!-- Teleport menu -->
    <a-entity id="menu-panel" position="3 1.5 -2">
      <a-box width="2" height="2.5" depth="0.1" color="#2C3E50" opacity="0.9"></a-box>
      <a-text value="ROOMS" position="0 1 0.06" align="center" color="#FFF" width="3"></a-text>

      <a-box class="room-btn" data-room="room1" position="0 0.5 0.06"  width="1.6" height="0.5" depth="0.05" color="#4682B4"></a-box>
      <a-text value="Blue Room"  position="0 0.5 0.12"  align="center" color="#FFF" width="3"></a-text>

      <a-box class="room-btn" data-room="room2" position="0 -0.2 0.06" width="1.6" height="0.5" depth="0.05" color="#228B22"></a-box>
      <a-text value="Green Room" position="0 -0.2 0.12" align="center" color="#FFF" width="3"></a-text>

      <a-box class="room-btn" data-room="room3" position="0 -0.9 0.06" width="1.6" height="0.5" depth="0.05" color="#8B0000"></a-box>
      <a-text value="Red Room"   position="0 -0.9 0.12" align="center" color="#FFF" width="3"></a-text>
    </a-entity>

    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.6" position="-0.5 1 1"></a-light>
  </a-scene>

  <script>
    // ── Room switching ────────────────────────────────────────────
    const skyColors = { room1: '#87CEEB', room2: '#90EE90', room3: '#FFB6C1' };
    const sky = document.getElementById('sky');

    document.querySelectorAll('.room-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.getAttribute('data-room');
        ['room1', 'room2', 'room3'].forEach(r =>
          document.getElementById(r).setAttribute('visible', r === target)
        );
        sky.setAttribute('color', skyColors[target]);
      });
      btn.addEventListener('mouseenter', () => btn.setAttribute('opacity', '0.7'));
      btn.addEventListener('mouseleave', () => btn.setAttribute('opacity', '1'));
    });

    // ── Editor panel ──────────────────────────────────────────────
    function toggleEditor() {
      document.getElementById('editor-panel').classList.toggle('open');
    }

    let modelCounter = 0;
    let currentFile = null;
    let loadedModels = [];

    const dropArea      = document.getElementById('dropArea');
    const fileInput     = document.getElementById('fileInput');
    const fileInfo      = document.getElementById('fileInfo');
    const fileNameEl    = document.getElementById('fileName');
    const addModelBtn   = document.getElementById('addModelBtn');
    const clearAllBtn   = document.getElementById('clearAllBtn');
    const scaleSlider   = document.getElementById('scaleSlider');
    const scaleValue    = document.getElementById('scaleValue');
    const rotationSlider = document.getElementById('rotationSlider');
    const rotationValue = document.getElementById('rotationValue');
    const statusMessage = document.getElementById('statusMessage');
    const modelsList    = document.getElementById('modelsList');

    dropArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['stl', 'obj', 'gltf', 'glb'].includes(ext)) {
        showStatus('Unsupported file. Use STL, OBJ, GLTF or GLB.', true);
        return;
      }
      currentFile = file;
      fileNameEl.textContent = file.name;
      fileInfo.classList.add('active');
      addModelBtn.disabled = false;
      showStatus('File ready.', false);
    }

    scaleSlider.addEventListener('input', e => scaleValue.textContent = e.target.value);
    rotationSlider.addEventListener('input', e => rotationValue.textContent = e.target.value + '°');

    addModelBtn.addEventListener('click', () => {
      if (!currentFile) return;
      const reader = new FileReader();
      reader.onload = e => {
        const modelData = {
          fileData: e.target.result,
          fileName: currentFile.name,
          fileType: currentFile.name.split('.').pop().toLowerCase()
        };
        const settings = {
          room: document.getElementById('roomSelect').value,
          position: {
            x: parseFloat(document.getElementById('posX').value),
            y: parseFloat(document.getElementById('posY').value),
            z: parseFloat(document.getElementById('posZ').value)
          },
          scale: parseFloat(scaleSlider.value),
          rotationY: parseFloat(rotationSlider.value),
          color: document.getElementById('colorPicker').value
        };
        addModelToScene(modelData, settings);
        showStatus('Model added!', false);
      };
      reader.readAsArrayBuffer(currentFile);
    });

    clearAllBtn.addEventListener('click', () => {
      if (!confirm('Remove all models from the scene?')) return;
      ['room1', 'room2', 'room3'].forEach(r => {
        const c = document.getElementById(`${r}-models`);
        while (c.firstChild) c.removeChild(c.firstChild);
      });
      loadedModels = [];
      renderModelsList();
      showStatus('All models cleared.', false);
    });

    function addModelToScene(modelData, settings) {
      const { fileData, fileName, fileType } = modelData;
      const { room, position, scale, rotationY, color } = settings;
      const modelId = `model-${modelCounter++}`;
      const container = document.getElementById(`${room}-models`);
      let entity;

      if (fileType === 'obj') {
        const url = URL.createObjectURL(new Blob([fileData], { type: 'text/plain' }));
        entity = document.createElement('a-entity');
        entity.setAttribute('obj-model', `obj: url(${url})`);
        entity.setAttribute('material', `color: ${color}`);
      } else if (fileType === 'gltf' || fileType === 'glb') {
        const type = fileType === 'glb' ? 'model/gltf-binary' : 'model/gltf+json';
        const url = URL.createObjectURL(new Blob([fileData], { type }));
        entity = document.createElement('a-entity');
        entity.setAttribute('gltf-model', `url(${url})`);
      } else {
        // STL — use a-entity with box geometry as placeholder; swap geometry after load
        entity = document.createElement('a-entity');
        entity.setAttribute('geometry', 'primitive: box');
        entity.setAttribute('material', `color: ${color}`);
        entity.addEventListener('loaded', () => {
          const mesh = entity.getObject3D('mesh');
          if (mesh) {
            const loader = new THREE.STLLoader ? new THREE.STLLoader() : null;
            if (loader) {
              mesh.geometry = loader.parse(fileData);
              mesh.geometry.computeBoundingSphere();
            }
          }
        });
      }

      entity.setAttribute('id', modelId);
      entity.setAttribute('position', `${position.x} ${position.y} ${position.z}`);
      entity.setAttribute('rotation', `0 ${rotationY} 0`);
      entity.setAttribute('scale', `${scale} ${scale} ${scale}`);
      container.appendChild(entity);

      loadedModels.push({ id: modelId, name: fileName });
      renderModelsList();
    }

    function removeModel(modelId) {
      const el = document.getElementById(modelId);
      if (el) el.remove();
      loadedModels = loadedModels.filter(m => m.id !== modelId);
      renderModelsList();
      showStatus('Model removed.', false);
    }

    function renderModelsList() {
      if (loadedModels.length === 0) {
        modelsList.innerHTML = '<p style="color:#7f8c8d;text-align:center;font-size:13px;">No models loaded yet</p>';
        return;
      }
      modelsList.innerHTML = '';
      loadedModels.forEach(model => {
        const item = document.createElement('div');
        item.className = 'model-item';
        item.innerHTML = `
          <span class="model-item-name">${model.name}</span>
          <button class="model-item-remove" onclick="removeModel('${model.id}')">Remove</button>
        `;
        modelsList.appendChild(item);
      });
    }

    function showStatus(msg, isError) {
      statusMessage.textContent = msg;
      statusMessage.classList.add('active');
      statusMessage.classList.toggle('error', isError);
      setTimeout(() => statusMessage.classList.remove('active'), 3000);
    }
  </script>
</body>
</html>
