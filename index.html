<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Room Viewer</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    
    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

    #info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(44, 62, 80, 0.9);
      padding: 15px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      z-index: 1000;
    }

    #info-panel h3 { margin: 0 0 10px; color: #4CC3D9; }

    #info-panel button {
      background: #4CC3D9;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    #info-panel button:hover { background: #3AB0C7; }

    #editor-panel {
      position: fixed;
      top: 0;
      right: -470px;
      width: 450px;
      height: 100vh;
      overflow-y: auto;
      z-index: 2000;
      transition: right 0.3s ease;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    #editor-panel.open { right: 0; }

    .editor-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .editor-header {
      background: #2C3E50;
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
    }

    .editor-header h1 { margin: 0; font-size: 22px; }
    .editor-header p { margin: 5px 0 0; opacity: 0.8; font-size: 13px; }

    #close-editor {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
    }

    #close-editor:hover { background: rgba(255,255,255,0.35); }

    .editor-content { padding: 20px; }

    .section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid #ecf0f1;
    }

    .section:last-child { border-bottom: none; margin-bottom: 0; }

    .section h2 {
      margin: 0 0 15px;
      color: #2C3E50;
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    .section h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: #667eea;
      margin-right: 10px;
      border-radius: 2px;
    }

    /* Room list */
    .room-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8f9fa;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .room-color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .room-name-input {
      flex: 1;
      border: 1px solid #ecf0f1;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 13px;
      color: #2C3E50;
    }

    .room-name-input:focus { outline: none; border-color: #667eea; }

    .room-rename-btn {
      background: #667eea !important;
      color: white;
      border: none;
      padding: 5px 10px !important;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      width: auto !important;
      white-space: nowrap;
    }

    .room-rename-btn:hover { background: #5a6fd6 !important; transform: none !important; }

    .room-delete-btn {
      background: #e74c3c !important;
      color: white;
      border: none;
      padding: 5px 10px !important;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      width: auto !important;
    }

    .room-delete-btn:hover { background: #c0392b !important; transform: none !important; }

    /* Create room form */
    .create-room-form {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
    }

    .create-room-form input[type="text"] {
      flex: 1;
      padding: 9px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      font-size: 13px;
    }

    .create-room-form input[type="text"]:focus { outline: none; border-color: #667eea; }

    .create-room-form input[type="color"] {
      width: 40px;
      height: 38px;
      padding: 2px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      cursor: pointer;
    }

    /* File upload */
    .file-upload-area {
      border: 3px dashed #bdc3c7;
      border-radius: 10px;
      padding: 25px;
      text-align: center;
      background: #f8f9fa;
      cursor: pointer;
      transition: all 0.3s;
    }

    .file-upload-area:hover, .file-upload-area.drag-over {
      border-color: #667eea;
      background: #f0f0ff;
    }

    .file-upload-area input { display: none; }
    .upload-icon { font-size: 40px; margin-bottom: 8px; }
    .upload-text { color: #7f8c8d; font-size: 13px; }

    .file-info {
      background: #e8f5e9;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
      font-size: 13px;
    }

    .file-info.active { display: block; }
    .file-info strong { color: #27ae60; }

    .control-group { margin-bottom: 12px; }

    .control-group label {
      display: block;
      margin-bottom: 4px;
      color: #34495e;
      font-weight: 600;
      font-size: 13px;
    }

    .control-group select,
    .control-group input[type="color"] {
      width: 100%;
      padding: 9px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      font-size: 13px;
    }

    .position-inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .position-inputs input {
      padding: 9px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      width: 100%;
    }

    .slider-container { display: flex; align-items: center; gap: 10px; }

    .slider-container input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ecf0f1;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
    }

    .slider-container input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
    }

    .slider-value { min-width: 45px; text-align: center; font-weight: 600; color: #667eea; font-size: 13px; }

    #editor-panel button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-bottom: 10px;
    }

    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .btn-primary:disabled { background: #95a5a6; cursor: not-allowed; }

    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; transform: translateY(-1px); }

    .models-list { max-height: 180px; overflow-y: auto; margin-top: 12px; }

    .model-item {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .model-item-name {
      flex: 1;
      font-size: 13px;
      color: #2C3E50;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .model-item-remove {
      background: #e74c3c !important;
      color: white;
      border: none;
      padding: 5px 10px !important;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      width: auto !important;
      margin-bottom: 0 !important;
    }

    .model-item-remove:hover { background: #c0392b !important; transform: none !important; }

    .status-message {
      background: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
      font-size: 13px;
      border: 1px solid #c3e6cb;
    }

    .status-message.active { display: block; }
    .status-message.error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }

    /* Walls editor */
    .wall-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .wall-form-grid input[type="number"],
    .wall-form-grid select {
      padding: 8px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      font-size: 13px;
      width: 100%;
    }

    .wall-form-grid input[type="number"]:focus,
    .wall-form-grid select:focus { outline: none; border-color: #667eea; }

    .wall-form-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .wall-form-row label { font-size: 12px; color: #7f8c8d; white-space: nowrap; }

    .wall-item {
      background: #f8f9fa;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .wall-color-dot {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .wall-item-label {
      flex: 1;
      font-size: 12px;
      color: #2C3E50;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .wall-delete-btn {
      background: #e74c3c !important;
      color: white;
      border: none;
      padding: 4px 9px !important;
      border-radius: 5px;
      cursor: pointer;
      font-size: 11px;
      width: auto !important;
      margin-bottom: 0 !important;
    }

    .wall-delete-btn:hover { background: #c0392b !important; transform: none !important; }

    /* ── Object Inspector ─────────────────────────────────────── */
    #obj-inspector {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(30, 39, 46, 0.96);
      border-radius: 10px;
      color: white;
      font-size: 13px;
      z-index: 1500;
      min-width: 360px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.5);
      border: 1px solid rgba(76, 195, 217, 0.3);
      user-select: none;
    }
    .insp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      font-weight: bold;
      color: #4CC3D9;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .insp-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 7px; }
    .insp-row { display: flex; align-items: center; gap: 5px; }
    .insp-row .insp-label {
      width: 64px; font-size: 11px; color: #95a5a6; flex-shrink: 0;
    }
    .insp-row .axis { font-size: 10px; color: #7f8c8d; width: 10px; text-align: right; flex-shrink: 0; }
    .insp-row input[type="number"] {
      width: 76px; background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
      color: #ecf0f1; padding: 4px 6px; font-size: 12px;
    }
    .insp-row input[type="number"]:focus { outline: none; border-color: #4CC3D9; background: rgba(76,195,217,0.08); }
    .insp-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 2px 0; }
    #obj-deselect {
      background: rgba(255,255,255,0.1); border: none; color: #bdc3c7;
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer; font-size: 13px; line-height: 1;
    }
    #obj-deselect:hover { background: rgba(231,76,60,0.5); color: white; }
    .insp-modes {
      display: flex; gap: 6px; padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .gizmo-mode-btn {
      flex: 1; padding: 5px 0; font-size: 12px; font-weight: bold;
      border: 1px solid rgba(255,255,255,0.15); border-radius: 5px; cursor: pointer;
      background: rgba(255,255,255,0.07); color: #aaa;
      transition: background 0.15s, color 0.15s;
    }
    .gizmo-mode-btn:hover { background: rgba(76,195,217,0.2); color: #fff; }
    .gizmo-mode-btn.active { background: #4CC3D9; color: #fff; border-color: #4CC3D9; }
  </style>
</head>
<body>

  <div id="info-panel">
    <h3>VR Room Viewer</h3>
    <div style="display:flex;gap:6px;margin-top:8px;">
      <button onclick="toggleEditor()" style="flex:1;">Editor</button>
      <button id="undo-btn" onclick="History.undo()" disabled title="Undo (Ctrl+Z)"
        style="flex:1;background:#5d6d7e;">&#x21B6; Undo</button>
      <button id="redo-btn" onclick="History.redo()" disabled title="Redo (Ctrl+Y)"
        style="flex:1;background:#5d6d7e;">&#x21B7; Redo</button>
    </div>
  </div>

  <!-- Object Inspector — shown when an object is selected by clicking it -->
  <div id="obj-inspector" style="display:none;">
    <div class="insp-header">
      <span id="obj-insp-name">Object</span>
      <button id="obj-deselect" title="Deselect" onclick="deselectObject()">&#x2715;</button>
    </div>
    <div class="insp-modes">
      <button class="gizmo-mode-btn active" data-mode="translate"
        onclick="gizmo.setMode('translate')">&#x2194; Move</button>
      <button class="gizmo-mode-btn" data-mode="rotate"
        onclick="gizmo.setMode('rotate')">&#x21BB; Rotate</button>
      <button class="gizmo-mode-btn" data-mode="scale"
        onclick="gizmo.setMode('scale')">&#x2922; Scale</button>
    </div>
    <div class="insp-body">

      <!-- Position -->
      <div class="insp-row">
        <span class="insp-label">Position</span>
        <span class="axis">X</span>
        <input type="number" id="obj-px" step="0.1" oninput="applyInspectorPos()">
        <span class="axis">Y</span>
        <input type="number" id="obj-py" step="0.1" oninput="applyInspectorPos()">
        <span class="axis">Z</span>
        <input type="number" id="obj-pz" step="0.1" oninput="applyInspectorPos()">
      </div>

      <!-- Rotation -->
      <div class="insp-row">
        <span class="insp-label">Rotation</span>
        <span class="axis">X</span>
        <input type="number" id="obj-rx" step="1" oninput="applyInspectorRot()">
        <span class="axis">Y</span>
        <input type="number" id="obj-ry" step="1" oninput="applyInspectorRot()">
        <span class="axis">Z</span>
        <input type="number" id="obj-rz" step="1" oninput="applyInspectorRot()">
      </div>

      <div class="insp-sep"></div>

      <!-- Wall dimensions (shown for walls) -->
      <div id="insp-wall-dims" class="insp-row" style="display:none;">
        <span class="insp-label">Dimensions</span>
        <span class="axis">W</span>
        <input type="number" id="obj-ww" step="0.1" min="0.1" oninput="applyInspectorDims()">
        <span class="axis">H</span>
        <input type="number" id="obj-wh" step="0.1" min="0.1" oninput="applyInspectorDims()">
        <span class="axis">D</span>
        <input type="number" id="obj-wd" step="0.05" min="0.05" oninput="applyInspectorDims()">
      </div>

      <!-- Scale (shown for models) -->
      <div id="insp-scale-row" class="insp-row" style="display:none;">
        <span class="insp-label">Scale</span>
        <span class="axis">S</span>
        <input type="number" id="obj-scale" step="0.05" min="0.01" oninput="applyInspectorScale()">
      </div>

      <div class="insp-sep"></div>

      <!-- Duplicate -->
      <div class="insp-row" style="justify-content:center;">
        <button onclick="duplicateObject()"
          style="flex:1;padding:7px 0;font-size:12px;font-weight:bold;
                 background:rgba(76,195,217,0.18);border:1px solid rgba(76,195,217,0.4);
                 border-radius:6px;color:#4CC3D9;cursor:pointer;">
          &#x2398; Duplicate
        </button>
      </div>

    </div>
  </div>

  <div id="editor-panel">
    <div class="editor-container">
      <div class="editor-header">
        <button id="close-editor" onclick="toggleEditor()">&#x2715;</button>
        <h1>Scene Editor</h1>
        <p>Manage rooms and 3D models</p>
      </div>
      <div class="editor-content">

        <!-- VR Edit Mode toggle -->
        <div class="section" style="padding-bottom:15px;margin-bottom:15px;">
          <button id="vrEditToggle" onclick="toggleVrEdit()"
            style="width:100%;padding:12px;font-size:15px;font-weight:bold;
                   background:#e67e22;color:white;border:none;border-radius:8px;cursor:pointer;">
            VR Edit Mode: OFF
          </button>
        </div>

        <!-- Rooms section -->
        <div class="section">
          <h2>Rooms</h2>
          <div id="roomsList"></div>
          <div class="create-room-form">
            <input type="text" id="newRoomName" placeholder="Room name">
            <input type="color" id="newRoomColor" value="#4682B4" title="Wall color">
            <button class="btn-primary" style="width:auto;padding:9px 14px;margin-bottom:0;" onclick="createRoom()">+ Add</button>
          </div>
        </div>

        <!-- Walls section -->
        <div class="section">
          <h2>Walls</h2>
          <div id="wallsList"></div>

          <div class="wall-form-grid">
            <div>
              <label style="font-size:12px;color:#7f8c8d;">Room</label>
              <select id="wallRoom"></select>
            </div>
            <div>
              <label style="font-size:12px;color:#7f8c8d;">Color</label>
              <input type="color" id="wallColor" value="#95a5a6"
                style="width:100%;height:36px;padding:2px;border:2px solid #ecf0f1;border-radius:8px;cursor:pointer;">
            </div>
            <div>
              <label style="font-size:12px;color:#7f8c8d;">Width</label>
              <input type="number" id="wallWidth" value="3" step="0.5" min="0.5">
            </div>
            <div>
              <label style="font-size:12px;color:#7f8c8d;">Height</label>
              <input type="number" id="wallHeight" value="4" step="0.5" min="0.5">
            </div>
            <div>
              <label style="font-size:12px;color:#7f8c8d;">Pos X</label>
              <input type="number" id="wallPosX" value="0" step="0.5">
            </div>
            <div>
              <label style="font-size:12px;color:#7f8c8d;">Pos Z</label>
              <input type="number" id="wallPosZ" value="-2" step="0.5">
            </div>
            <div>
              <label style="font-size:12px;color:#7f8c8d;">Rotation Y</label>
              <input type="number" id="wallRotY" value="0" step="15" min="0" max="360">
            </div>
          </div>

          <button class="btn-primary" onclick="addWall()" style="margin-bottom:0;">+ Add Wall</button>
        </div>

        <!-- Upload section -->
        <div class="section">
          <h2>Upload Model</h2>
          <div class="file-upload-area" id="dropArea">
            <input type="file" id="fileInput" accept=".stl,.obj,.gltf,.glb">
            <div class="upload-icon">📦</div>
            <div class="upload-text">
              <strong>Click to browse</strong> or drag & drop<br>
              <small>STL, OBJ, GLTF, GLB supported</small>
            </div>
          </div>
          <div class="file-info" id="fileInfo">
            <strong>Selected:</strong> <span id="fileName"></span>
          </div>
        </div>

        <!-- Model settings section -->
        <div class="section">
          <h2>Model Settings</h2>
          <div class="control-group">
            <label>Target Room</label>
            <select id="roomSelect"></select>
          </div>
          <div class="control-group">
            <label>Position (X, Y, Z)</label>
            <div class="position-inputs">
              <input type="number" id="posX" value="0" step="0.1" placeholder="X">
              <input type="number" id="posY" value="1" step="0.1" placeholder="Y">
              <input type="number" id="posZ" value="-3" step="0.1" placeholder="Z">
            </div>
          </div>
          <div class="control-group">
            <label>Scale</label>
            <div class="slider-container">
              <input type="range" id="scaleSlider" min="0.1" max="5" step="0.1" value="1">
              <span class="slider-value" id="scaleValue">1.0</span>
            </div>
          </div>
          <div class="control-group">
            <label>Rotation Y</label>
            <div class="slider-container">
              <input type="range" id="rotationSlider" min="0" max="360" step="15" value="0">
              <span class="slider-value" id="rotationValue">0°</span>
            </div>
          </div>
          <div class="control-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#ffffff">
          </div>
        </div>

        <!-- Actions section -->
        <div class="section">
          <h2>Actions</h2>
          <button class="btn-primary" id="addModelBtn" disabled>Add to Scene</button>
          <button class="btn-danger" id="clearAllBtn">Clear All Models</button>
          <div class="status-message" id="statusMessage"></div>
        </div>

        <!-- Loaded models section -->
        <div class="section">
          <h2>Loaded Models</h2>
          <div class="models-list" id="modelsList">
            <p style="color:#7f8c8d;text-align:center;font-size:13px;">No models loaded yet</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <a-scene>
    <a-entity id="rig" position="0 0 0" room-collider fly-camera>

      <a-camera look-controls="enabled: false" wasd-controls="enabled: false">
        <!-- Desktop mouse cursor -->
        <a-cursor cursor="rayOrigin: mouse"
          raycaster="objects: [data-room]; far: 100"
          color="#4CC3D9" opacity="0.8">
        </a-cursor>
      </a-camera>

      <!-- Left controller — thumbstick up: arc teleport | L/R: snap turn | trigger: click -->
      <a-entity id="left-controller"
        oculus-touch-controls="hand: left"
        vive-controls="hand: left"
        raycaster="objects: [data-room], .clickable; far: 10; showLine: false; direction: 0 -0.342 -0.940"
        arc-teleporter
        snap-turn
        vr-pointer
        smart-laser
        wall-grabber>
      </a-entity>

      <!-- Right controller — thumbstick up: arc teleport | L/R: snap turn | trigger: click -->
      <a-entity id="right-controller"
        oculus-touch-controls="hand: right"
        vive-controls="hand: right"
        raycaster="objects: [data-room], .clickable; far: 10; showLine: false; direction: 0 -0.342 -0.940"
        arc-teleporter
        snap-turn
        vr-pointer
        smart-laser
        wall-grabber>
      </a-entity>

    </a-entity>
    <a-sky id="sky" color="#87CEEB"></a-sky>
    <a-entity id="rooms-container"></a-entity>
    <a-entity id="menu-panel" position="3 1.5 -2"></a-entity>
    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.6" position="-0.5 1 1"></a-light>
  </a-scene>

  <script>
    // ── Fly camera — desktop free-fly: right-drag look, scroll zoom, WASD/QE fly ─
    AFRAME.registerComponent('fly-camera', {
      init: function () {
        this._pitch  = 0;
        this._yaw    = 0;
        this._keys   = {};
        this._rDown  = false; // right mouse held
        this._lx     = 0;
        this._ly     = 0;
        this._camEl  = null;

        const scene  = this.el.sceneEl;
        const canvas = scene.canvas;

        // Prevent right-click context menu on canvas
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        canvas.addEventListener('mousedown', e => {
          if (scene.is('vr-mode') || e.button !== 2) return;
          this._rDown = true;
          this._lx = e.clientX;
          this._ly = e.clientY;
        });

        canvas.addEventListener('mousemove', e => {
          if (!this._rDown || scene.is('vr-mode')) return;
          const dx = e.clientX - this._lx;
          const dy = e.clientY - this._ly;
          this._lx = e.clientX;
          this._ly = e.clientY;
          this._yaw   -= dx * 0.003;
          this._pitch -= dy * 0.003;
          this._pitch  = Math.max(-Math.PI / 2 + 0.01, Math.min(Math.PI / 2 - 0.01, this._pitch));
          this.el.object3D.rotation.order = 'YXZ';
          this.el.object3D.rotation.y = this._yaw;
          if (this._camEl) this._camEl.object3D.rotation.x = this._pitch;
        });

        window.addEventListener('mouseup', e => {
          if (e.button === 2) this._rDown = false;
        });

        canvas.addEventListener('wheel', e => {
          if (scene.is('vr-mode')) return;
          e.preventDefault();
          const fwd = new THREE.Vector3(0, 0, -1).applyEuler(
            new THREE.Euler(this._pitch, this._yaw, 0, 'YXZ')
          );
          this.el.object3D.position.addScaledVector(fwd, -e.deltaY * 0.012);
        }, { passive: false });

        window.addEventListener('keydown', e => { this._keys[e.code] = true; });
        window.addEventListener('keyup',   e => { this._keys[e.code] = false; });
      },

      tick: function (time, delta) {
        if (this.el.sceneEl.is('vr-mode')) return;
        if (!this._camEl) {
          this._camEl = this.el.querySelector('a-camera');
          if (!this._camEl) return;
          this._yaw   = this.el.object3D.rotation.y;
          this._pitch = this._camEl.object3D.rotation.x;
        }

        const speed = 0.007 * delta;
        const fwd   = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(this._pitch, this._yaw, 0, 'YXZ'));
        const right = new THREE.Vector3(1, 0, 0).applyEuler(new THREE.Euler(0, this._yaw, 0, 'YXZ'));
        const up    = new THREE.Vector3(0, 1, 0);

        if (this._keys['KeyW'] || this._keys['ArrowUp'])    this.el.object3D.position.addScaledVector(fwd,   speed);
        if (this._keys['KeyS'] || this._keys['ArrowDown'])  this.el.object3D.position.addScaledVector(fwd,  -speed);
        if (this._keys['KeyA'] || this._keys['ArrowLeft'])  this.el.object3D.position.addScaledVector(right, -speed);
        if (this._keys['KeyD'] || this._keys['ArrowRight']) this.el.object3D.position.addScaledVector(right,  speed);
        if (this._keys['KeyE']) this.el.object3D.position.addScaledVector(up,  speed);
        if (this._keys['KeyQ']) this.el.object3D.position.addScaledVector(up, -speed);
      }
    });

    // ── Arc teleporter component ──────────────────────────────────
    AFRAME.registerComponent('arc-teleporter', {
      init: function () {
        this.rig = document.getElementById('rig');
        this.active = false;
        this.landingPoint = null;
        this.tmpQuat = new THREE.Quaternion();

        const scene = this.el.sceneEl;

        // Arc dots
        this.dots = [];
        for (let i = 0; i < 30; i++) {
          const dot = document.createElement('a-sphere');
          dot.setAttribute('radius', '0.04');
          dot.setAttribute('color', '#4CC3D9');
          dot.setAttribute('segments-height', '4');
          dot.setAttribute('segments-width', '4');
          dot.object3D.visible = false;
          scene.appendChild(dot);
          this.dots.push(dot);
        }

        // Landing ring
        this.ring = document.createElement('a-ring');
        this.ring.setAttribute('radius-inner', '0.2');
        this.ring.setAttribute('radius-outer', '0.45');
        this.ring.setAttribute('color', '#4CC3D9');
        this.ring.setAttribute('rotation', '-90 0 0');
        this.ring.setAttribute('material', 'side: double; opacity: 0.8');
        this.ring.object3D.visible = false;
        scene.appendChild(this.ring);

        this.el.addEventListener('thumbstickmoved', (evt) => {
          const grabbing = this.el.components['wall-grabber'] && this.el.components['wall-grabber'].grabbed;
          if (grabbing) return;
          const y = evt.detail.y;
          if (y < -0.7 && !this.active) {
            this.active = true;
          }
          if (Math.abs(y) < 0.2 && this.active) {
            this.doTeleport();
          }
        });
      },

      tick: function () {
        if (!this.active) return;

        const origin = new THREE.Vector3();
        const dir    = new THREE.Vector3(0, 0, -1);

        this.el.object3D.getWorldPosition(origin);
        this.el.object3D.getWorldQuaternion(this.tmpQuat);
        dir.applyQuaternion(this.tmpQuat).normalize();

        const speed   = 8;
        const gravity = -9.8;
        const dt      = 0.08;

        const vx = dir.x * speed;
        const vy = dir.y * speed;
        const vz = dir.z * speed;

        this.landingPoint = null;
        let hitIndex = this.dots.length;
        let prevY = origin.y;

        for (let i = 0; i < this.dots.length; i++) {
          const t = i * dt;
          const x = origin.x + vx * t;
          const y = origin.y + vy * t + 0.5 * gravity * t * t;
          const z = origin.z + vz * t;

          if (!this.landingPoint && y <= 0.01 && prevY > 0.01) {
            this.landingPoint = new THREE.Vector3(
              Math.max(-4.6, Math.min(4.6, x)),
              0,
              Math.max(-4.6, Math.min(4.6, z))
            );
            hitIndex = i;
          }

          if (i < hitIndex) {
            this.dots[i].object3D.visible = true;
            this.dots[i].object3D.position.set(x, y, z);
          } else {
            this.dots[i].object3D.visible = false;
          }

          prevY = y;
        }

        if (this.landingPoint) {
          this.ring.object3D.visible = true;
          this.ring.object3D.position.set(this.landingPoint.x, 0.01, this.landingPoint.z);
        } else {
          this.ring.object3D.visible = false;
        }
      },

      doTeleport: function () {
        if (this.landingPoint) {
          this.rig.object3D.position.set(this.landingPoint.x, 0, this.landingPoint.z);
        }
        this.active = false;
        this.landingPoint = null;
        this.dots.forEach(d => { d.object3D.visible = false; });
        this.ring.object3D.visible = false;
      },

      remove: function () {
        this.dots.forEach(d => d.parentNode && d.parentNode.removeChild(d));
        if (this.ring.parentNode) this.ring.parentNode.removeChild(this.ring);
      }
    });

    // ── VR pointer — trigger fires click on intersected element ───
    AFRAME.registerComponent('vr-pointer', {
      init: function () {
        this.el.addEventListener('triggerdown', () => {
          const rc = this.el.components.raycaster;
          if (rc && rc.intersectedEls.length > 0) {
            rc.intersectedEls[0].emit('click');
          }
        });
      }
    });

    // ── Smart laser — beam appears when roughly aimed at any target ─
    AFRAME.registerComponent('smart-laser', {
      schema: { angle: { default: 30 } }, // cone half-angle in degrees

      init: function () {
        this.wasNear   = false;
        this.ctrlPos   = new THREE.Vector3();
        this.ctrlDir   = new THREE.Vector3();
        this.ctrlQuat  = new THREE.Quaternion();
        this.targetPos = new THREE.Vector3();
        this.tiltDeg   = 20; // degrees downward

        // Wrapper rotated down — beam pivots from controller tip
        const wrapper = document.createElement('a-entity');
        wrapper.setAttribute('rotation', `-${this.tiltDeg} 0 0`);
        this.el.appendChild(wrapper);

        const beam = document.createElement('a-box');
        beam.setAttribute('width',    '0.005');
        beam.setAttribute('height',   '0.005');
        beam.setAttribute('depth',    '10');
        beam.setAttribute('position', '0 0 -5');
        beam.setAttribute('material', 'color: #4CC3D9; opacity: 0.8; shader: flat');
        wrapper.appendChild(beam);
        this.wrapper = wrapper;
      },

      tick: function () {
        this.el.object3D.getWorldPosition(this.ctrlPos);
        this.el.object3D.getWorldQuaternion(this.ctrlQuat);

        // Forward direction tilted down by tiltDeg in local space
        const rad = THREE.MathUtils.degToRad(this.tiltDeg);
        this.ctrlDir
          .set(0, -Math.sin(rad), -Math.cos(rad))
          .applyQuaternion(this.ctrlQuat)
          .normalize();

        const extraSel = vrEditMode ? ', .vr-wall, .vr-grabbable' : '';
        const targets = document.querySelectorAll(`[data-room], .clickable${extraSel}`);
        const cosThreshold = Math.cos(THREE.MathUtils.degToRad(this.data.angle));
        let near = false;

        for (let i = 0; i < targets.length; i++) {
          targets[i].object3D.getWorldPosition(this.targetPos);
          const dot = this.ctrlDir.dot(
            this.targetPos.sub(this.ctrlPos).normalize()
          );
          if (dot > cosThreshold) { near = true; break; }
        }

        if (near !== this.wasNear) {
          this.wasNear = near;
          this.wrapper.object3D.visible = near;
        }
      }
    });

    // ── Snap turn + step back component ──────────────────────────
    AFRAME.registerComponent('snap-turn', {
      schema: {
        angle:    { default: 30 },
        stepDist: { default: 1.5 },
        threshold: { default: 0.7 }
      },
      init: function () {
        this.rig    = document.getElementById('rig');
        this.readyX = true;
        this.readyY = true;

        this.el.addEventListener('thumbstickmoved', (evt) => {
          const x = evt.detail.x;
          const y = evt.detail.y;

          // Left / right → snap turn (not while grabbing a wall)
          const grabbingWall = this.el.components['wall-grabber'] && this.el.components['wall-grabber'].grabbed;
          if (Math.abs(x) > this.data.threshold && this.readyX && !grabbingWall) {
            this.readyX = false;
            const snap = THREE.MathUtils.degToRad(this.data.angle);
            this.rig.object3D.rotation.y += x > 0 ? -snap : snap;
          }
          if (Math.abs(x) < 0.2) this.readyX = true;

          // Down → step back (not while grabbing a wall)
          const grabbing = this.el.components['wall-grabber'] && this.el.components['wall-grabber'].grabbed;
          if (y > this.data.threshold && this.readyY && !grabbing) {
            this.readyY = false;
            const ry   = this.rig.object3D.rotation.y;
            const dist = this.data.stepDist;
            const nx   = this.rig.object3D.position.x + Math.sin(ry) * dist;
            const nz   = this.rig.object3D.position.z + Math.cos(ry) * dist;
            this.rig.object3D.position.x = Math.max(-4.6, Math.min(4.6, nx));
            this.rig.object3D.position.z = Math.max(-4.6, Math.min(4.6, nz));
          }
          if (y < 0.2) this.readyY = true;
        });
      }
    });

    // ── Wall / model grabber — grip to grab and move objects in VR ─
    AFRAME.registerComponent('wall-grabber', {
      init: function () {
        this.grabbed    = null;  // { id, type: 'wall'|'model', ... }
        this.offset     = new THREE.Vector3();
        this.ctrlPos    = new THREE.Vector3();
        this.ctrlQuat   = new THREE.Quaternion();
        this.invQuat    = new THREE.Quaternion();
        this._wPos      = new THREE.Vector3();
        this.joystickY  = 0;
        this.joystickX  = 0;

        this.el.addEventListener('gripdown', () => this.grab());
        this.el.addEventListener('gripup',   () => this.release());
        this.el.addEventListener('thumbstickmoved', (evt) => {
          this.joystickY = evt.detail.y;
          this.joystickX = evt.detail.x;
        });
      },

      grab: function () {
        if (this.grabbed || !vrEditMode) return;
        this.el.object3D.getWorldPosition(this.ctrlPos);
        this.el.object3D.getWorldQuaternion(this.ctrlQuat);
        this.invQuat.copy(this.ctrlQuat).invert();

        let nearest = null, nearestDist = 4.0, nearestType = null;

        // Search walls
        walls.forEach(w => {
          const el = document.getElementById(w.id);
          if (!el) return;
          el.object3D.getWorldPosition(this._wPos);
          const d = this.ctrlPos.distanceTo(this._wPos);
          if (d < nearestDist) { nearestDist = d; nearest = w; nearestType = 'wall'; }
        });

        // Search loaded models
        loadedModels.forEach(m => {
          const el = document.getElementById(m.id);
          if (!el) return;
          el.object3D.getWorldPosition(this._wPos);
          const d = this.ctrlPos.distanceTo(this._wPos);
          if (d < nearestDist) { nearestDist = d; nearest = m; nearestType = 'model'; }
        });

        if (nearest) {
          const grabEl = document.getElementById(nearest.id);
          grabEl.object3D.getWorldPosition(this._wPos);
          this.offset.subVectors(this._wPos, this.ctrlPos).applyQuaternion(this.invQuat);
          this.grabbed = { ...nearest, type: nearestType };

          // Visual highlight for walls
          if (nearestType === 'wall') {
            grabEl.setAttribute('material', `color: ${nearest.color}; emissive: #ffffff; emissiveIntensity: 0.15`);
          }
          // For models, scale slightly to indicate selection
          if (nearestType === 'model') {
            const s = grabEl.object3D.scale;
            grabEl.object3D.scale.set(s.x * 1.05, s.y * 1.05, s.z * 1.05);
            this.grabbed._origScale = { x: s.x * 1.05, y: s.y * 1.05, z: s.z * 1.05 };
          }
        }
      },

      tick: function (time, delta) {
        if (!this.grabbed) return;
        const grabEl = document.getElementById(this.grabbed.id);
        if (!grabEl) { this.grabbed = null; return; }

        // Joystick Y → push further / pull closer
        if (Math.abs(this.joystickY) > 0.2) {
          const len = this.offset.length();
          if (len > 0) {
            const change = -this.joystickY * 0.004 * delta;
            const newLen = Math.max(0.4, Math.min(9, len + change));
            this.offset.multiplyScalar(newLen / len);
          }
        }

        // Joystick X → rotate around Y axis
        if (Math.abs(this.joystickX) > 0.2) {
          grabEl.object3D.rotation.y += this.joystickX * 0.002 * delta;
          if (this.grabbed.type === 'wall') {
            this.grabbed.rotY = THREE.MathUtils.radToDeg(grabEl.object3D.rotation.y);
          }
        }

        this.el.object3D.getWorldPosition(this.ctrlPos);
        this.el.object3D.getWorldQuaternion(this.ctrlQuat);

        const newPos = this.offset.clone().applyQuaternion(this.ctrlQuat).add(this.ctrlPos);
        grabEl.object3D.position.copy(newPos);

        // Keep data in sync for wall collisions
        if (this.grabbed.type === 'wall') {
          const w = walls.find(w => w.id === this.grabbed.id);
          if (w) { w.position.x = newPos.x; w.position.y = newPos.y; w.position.z = newPos.z; }
        }

        // Keep inspector in sync if this object is currently selected
        if (typeof selectedEl !== 'undefined' && selectedEl === grabEl) refreshInspector();
      },

      release: function () {
        if (!this.grabbed) return;
        const grabEl = document.getElementById(this.grabbed.id);
        if (grabEl) {
          if (this.grabbed.type === 'wall') {
            const w = walls.find(w => w.id === this.grabbed.id);
            grabEl.setAttribute('material', `color: ${w ? w.color : '#ffffff'}`);
          }
          if (this.grabbed.type === 'model' && this.grabbed._origScale) {
            const s = this.grabbed._origScale;
            grabEl.object3D.scale.set(s.x / 1.05, s.y / 1.05, s.z / 1.05);
          }
        }
        this.grabbed = null;
      }
    });

    // ── Room collider — room bounds + custom wall collision ───────
    AFRAME.registerComponent('room-collider', {
      init: function () {
        this._tmp   = new THREE.Vector3();
        this._wPos  = new THREE.Vector3();
        this._wQuat = new THREE.Quaternion();
        this._inv   = new THREE.Quaternion();
        this._push  = new THREE.Vector3();
      },
      tick: function () {
        if (!this.el.sceneEl.is('vr-mode')) return; // desktop: free-fly, no collision
        const pos   = this.el.object3D.position;
        const limit = 4.6;
        if (pos.x >  limit) pos.x =  limit;
        if (pos.x < -limit) pos.x = -limit;
        if (pos.z >  limit) pos.z =  limit;
        if (pos.z < -limit) pos.z = -limit;

        // Custom wall collision using world-space position and quaternion
        const playerR = 0.3;
        walls.forEach(w => {
          const wEl = document.getElementById(w.id);
          if (!wEl) return;

          wEl.object3D.getWorldPosition(this._wPos);
          wEl.object3D.getWorldQuaternion(this._wQuat);
          this._inv.copy(this._wQuat).invert();

          // Transform player XZ into wall's local space
          this._tmp.set(pos.x - this._wPos.x, 0, pos.z - this._wPos.z)
                   .applyQuaternion(this._inv);

          const halfW = w.width  / 2 + playerR;
          const halfD = w.depth  / 2 + playerR;

          if (Math.abs(this._tmp.x) < halfW && Math.abs(this._tmp.z) < halfD) {
            const ovX = halfW - Math.abs(this._tmp.x);
            const ovZ = halfD - Math.abs(this._tmp.z);
            this._push.set(0, 0, 0);
            if (ovZ < ovX) this._push.z = this._tmp.z > 0 ?  ovZ : -ovZ;
            else           this._push.x = this._tmp.x > 0 ?  ovX : -ovX;

            // Back to world space
            this._push.applyQuaternion(this._wQuat);
            pos.x += this._push.x;
            pos.z += this._push.z;
          }
        });
      }
    });

    // ── Room data ─────────────────────────────────────────────────
    let rooms = [
      { id: 'room1', name: 'Blue Room',  color: '#5B9BD5', floorColor: '#4682B4' },
      { id: 'room2', name: 'Green Room', color: '#32CD32', floorColor: '#228B22' },
      { id: 'room3', name: 'Red Room',   color: '#DC143C', floorColor: '#8B0000' },
    ];
    let activeRoomId = 'room1';
    let roomCounter  = 4;

    // ── VR Edit Mode ──────────────────────────────────────────────
    let vrEditMode = false;
    function toggleVrEdit() {
      vrEditMode = !vrEditMode;
      const btn = document.getElementById('vrEditToggle');
      btn.textContent = vrEditMode ? 'VR Edit Mode: ON' : 'VR Edit Mode: OFF';
      btn.style.background = vrEditMode ? '#27ae60' : '#e67e22';
    }

    // ── Walls data ────────────────────────────────────────────────
    let walls = [];
    let wallCounter = 0;

    function darken(hex) {
      const r = Math.round(parseInt(hex.slice(1,3),16) * 0.75);
      const g = Math.round(parseInt(hex.slice(3,5),16) * 0.75);
      const b = Math.round(parseInt(hex.slice(5,7),16) * 0.75);
      return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
    }

    // ── Scene rendering ───────────────────────────────────────────
    function renderScene() {
      renderRooms();
      renderMenuPanel();
    }

    function renderRooms() {
      const container = document.getElementById('rooms-container');
      while (container.firstChild) container.removeChild(container.firstChild);

      rooms.forEach(room => {
        const entity = document.createElement('a-entity');
        entity.setAttribute('id', room.id);
        entity.setAttribute('visible', room.id === activeRoomId);

        const floor = document.createElement('a-plane');
        floor.setAttribute('class', 'floor');
        floor.setAttribute('position', '0 0 0');
        floor.setAttribute('rotation', '-90 0 0');
        floor.setAttribute('width', '10');
        floor.setAttribute('height', '10');
        floor.setAttribute('color', room.floorColor);
        entity.appendChild(floor);

        const wallDefs = [
          { pos: '0 2 -5',  rot: '0 0 0' },
          { pos: '5 2 0',   rot: '0 90 0' },
          { pos: '-5 2 0',  rot: '0 90 0' },
          { pos: '0 2 5',   rot: '0 0 0' },
        ];
        wallDefs.forEach(w => {
          const wall = document.createElement('a-box');
          wall.setAttribute('position', w.pos);
          wall.setAttribute('rotation', w.rot);
          wall.setAttribute('width', '10');
          wall.setAttribute('height', '4');
          wall.setAttribute('depth', '0.2');
          wall.setAttribute('color', room.color);
          entity.appendChild(wall);
        });

        const label = document.createElement('a-text');
        label.setAttribute('id', `${room.id}-label`);
        label.setAttribute('value', room.name.toUpperCase());
        label.setAttribute('position', '0 3 -4.8');
        label.setAttribute('align', 'center');
        label.setAttribute('color', '#FFF');
        label.setAttribute('width', '8');
        entity.appendChild(label);

        const modelsContainer = document.createElement('a-entity');
        modelsContainer.setAttribute('id', `${room.id}-models`);
        entity.appendChild(modelsContainer);

        container.appendChild(entity);
      });
    }

    function renderMenuPanel() {
      const panel = document.getElementById('menu-panel');
      while (panel.firstChild) panel.removeChild(panel.firstChild);

      const n = rooms.length;
      const btnH = 0.5;
      const gap = 0.15;
      const panelH = 0.5 + n * (btnH + gap) + gap;

      const bg = document.createElement('a-box');
      bg.setAttribute('width', '2');
      bg.setAttribute('height', panelH.toString());
      bg.setAttribute('depth', '0.1');
      bg.setAttribute('color', '#2C3E50');
      bg.setAttribute('opacity', '0.9');
      panel.appendChild(bg);

      const title = document.createElement('a-text');
      title.setAttribute('value', 'ROOMS');
      title.setAttribute('position', `0 ${(panelH / 2 - 0.25).toFixed(2)} 0.06`);
      title.setAttribute('align', 'center');
      title.setAttribute('color', '#FFF');
      title.setAttribute('width', '3');
      panel.appendChild(title);

      rooms.forEach((room, i) => {
        const y = (panelH / 2 - 0.55 - i * (btnH + gap)).toFixed(2);

        const btn = document.createElement('a-box');
        btn.setAttribute('data-room', room.id);
        btn.setAttribute('position', `0 ${y} 0.06`);
        btn.setAttribute('width', '1.6');
        btn.setAttribute('height', btnH.toString());
        btn.setAttribute('depth', '0.05');
        btn.setAttribute('color', room.color);
        btn.addEventListener('click', () => switchRoom(room.id));
        btn.addEventListener('mouseenter', () => btn.setAttribute('opacity', '0.7'));
        btn.addEventListener('mouseleave', () => btn.setAttribute('opacity', '1'));
        panel.appendChild(btn);

        const lbl = document.createElement('a-text');
        lbl.setAttribute('value', room.name);
        lbl.setAttribute('position', `0 ${y} 0.12`);
        lbl.setAttribute('align', 'center');
        lbl.setAttribute('color', '#FFF');
        lbl.setAttribute('width', '3');
        panel.appendChild(lbl);
      });
    }

    function switchRoom(id) {
      activeRoomId = id;
      rooms.forEach(r => {
        const el = document.getElementById(r.id);
        if (el) el.setAttribute('visible', r.id === id);
      });
    }

    // ── Editor: room management ───────────────────────────────────
    function renderRoomsList() {
      const list = document.getElementById('roomsList');
      list.innerHTML = '';
      rooms.forEach(room => {
        const item = document.createElement('div');
        item.className = 'room-item';
        item.innerHTML = `
          <div class="room-color-dot" style="background:${room.color}"></div>
          <input class="room-name-input" type="text" value="${room.name}" id="name-${room.id}">
          <button class="room-rename-btn" onclick="renameRoom('${room.id}')">Rename</button>
          <button class="room-delete-btn" onclick="deleteRoom('${room.id}')">Delete</button>
        `;
        list.appendChild(item);
      });
    }

    function renderRoomSelect() {
      const sel = document.getElementById('roomSelect');
      const current = sel.value;
      sel.innerHTML = '';
      rooms.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name;
        sel.appendChild(opt);
      });
      if (rooms.find(r => r.id === current)) sel.value = current;
    }

    // ── Wall functions ────────────────────────────────────────────
    function renderWallRoomSelect() {
      const sel = document.getElementById('wallRoom');
      const cur = sel.value;
      sel.innerHTML = '';
      rooms.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name;
        sel.appendChild(opt);
      });
      if (rooms.find(r => r.id === cur)) sel.value = cur;
    }

    function _addWallToScene(wall) {
      walls.push(wall);
      const roomEl = document.getElementById(wall.room);
      if (roomEl) {
        const el = document.createElement('a-box');
        el.setAttribute('id',       wall.id);
        el.setAttribute('class',    'vr-wall');
        el.setAttribute('width',    wall.width);
        el.setAttribute('height',   wall.height);
        el.setAttribute('depth',    wall.depth);
        el.setAttribute('color',    wall.color);
        el.setAttribute('position', `${wall.position.x} ${wall.position.y} ${wall.position.z}`);
        el.setAttribute('rotation', `0 ${wall.rotY} 0`);
        roomEl.appendChild(el);
      }
      renderWallsList();
    }

    function _removeWallFromScene(id) {
      const el = document.getElementById(id);
      if (el && selectedEl === el) deselectObject();
      if (el) el.remove();
      walls = walls.filter(w => w.id !== id);
      renderWallsList();
    }

    function addWall() {
      const room   = document.getElementById('wallRoom').value;
      const color  = document.getElementById('wallColor').value;
      const width  = parseFloat(document.getElementById('wallWidth').value)  || 3;
      const height = parseFloat(document.getElementById('wallHeight').value) || 4;
      const posX   = parseFloat(document.getElementById('wallPosX').value)   || 0;
      const posZ   = parseFloat(document.getElementById('wallPosZ').value)   || -2;
      const rotY   = parseFloat(document.getElementById('wallRotY').value)   || 0;
      const id     = `vr-wall-${wallCounter++}`;
      const wall   = { id, room, color, width, height, depth: 0.2,
                       position: { x: posX, y: height / 2, z: posZ }, rotY };
      _addWallToScene(wall);
      const saved = JSON.parse(JSON.stringify(wall));
      History.push({
        undo() { _removeWallFromScene(saved.id); },
        redo() { _addWallToScene(JSON.parse(JSON.stringify(saved))); }
      });
      showStatus('Wall added.', false);
    }

    function removeWall(id) {
      const wall = walls.find(w => w.id === id);
      if (!wall) return;
      const saved = JSON.parse(JSON.stringify(wall));
      _removeWallFromScene(id);
      History.push({
        undo() { _addWallToScene(JSON.parse(JSON.stringify(saved))); },
        redo() { _removeWallFromScene(saved.id); }
      });
      showStatus('Wall removed.', false);
    }

    function renderWallsList() {
      const list = document.getElementById('wallsList');
      list.innerHTML = '';
      if (walls.length === 0) {
        list.innerHTML = '<p style="color:#7f8c8d;font-size:12px;text-align:center;">No walls added yet</p>';
        return;
      }
      walls.forEach(w => {
        const roomName = (rooms.find(r => r.id === w.room) || {}).name || w.room;
        const item = document.createElement('div');
        item.className = 'wall-item';
        item.innerHTML = `
          <div class="wall-color-dot" style="background:${w.color}"></div>
          <span class="wall-item-label">${w.width}×${w.height} in ${roomName}</span>
          <button class="wall-delete-btn" onclick="removeWall('${w.id}')">Remove</button>
        `;
        list.appendChild(item);
      });
    }

    function createRoom() {
      const nameInput = document.getElementById('newRoomName');
      const colorInput = document.getElementById('newRoomColor');
      const name = nameInput.value.trim() || `Room ${roomCounter}`;
      const color = colorInput.value;
      const id = `room${roomCounter++}`;

      rooms.push({ id, name, color, floorColor: darken(color) });
      nameInput.value = '';

      renderScene();
      renderRoomsList();
      renderRoomSelect();
      renderWallRoomSelect();
      showStatus(`Room "${name}" created.`, false);
    }

    function deleteRoom(id) {
      const room = rooms.find(r => r.id === id);
      rooms = rooms.filter(r => r.id !== id);
      loadedModels = loadedModels.filter(m => m.room !== id);
      walls = walls.filter(w => w.room !== id);

      if (activeRoomId === id) activeRoomId = rooms.length ? rooms[0].id : null;

      renderScene();
      renderRoomsList();
      renderRoomSelect();
      renderWallRoomSelect();
      renderWallsList();
      renderModelsList();
      showStatus(`Room "${room.name}" deleted.`, false);
    }

    function renameRoom(id) {
      const input = document.getElementById(`name-${id}`);
      const newName = input.value.trim();
      if (!newName) return;

      const room = rooms.find(r => r.id === id);
      room.name = newName;

      const label = document.getElementById(`${id}-label`);
      if (label) label.setAttribute('value', newName.toUpperCase());
      renderMenuPanel();
      renderRoomsList();
      renderRoomSelect();
      renderWallRoomSelect();
      showStatus(`Renamed to "${newName}".`, false);
    }

    // ── Editor panel toggle ───────────────────────────────────────
    function toggleEditor() {
      document.getElementById('editor-panel').classList.toggle('open');
    }

    // ── Model upload ──────────────────────────────────────────────
    let modelCounter = 0;
    let currentFile = null;
    let loadedModels = [];

    const dropArea       = document.getElementById('dropArea');
    const fileInput      = document.getElementById('fileInput');
    const fileInfo       = document.getElementById('fileInfo');
    const fileNameEl     = document.getElementById('fileName');
    const addModelBtn    = document.getElementById('addModelBtn');
    const clearAllBtn    = document.getElementById('clearAllBtn');
    const scaleSlider    = document.getElementById('scaleSlider');
    const scaleValue     = document.getElementById('scaleValue');
    const rotationSlider = document.getElementById('rotationSlider');
    const rotationValue  = document.getElementById('rotationValue');
    const statusMessage  = document.getElementById('statusMessage');
    const modelsList     = document.getElementById('modelsList');

    dropArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['stl', 'obj', 'gltf', 'glb'].includes(ext)) {
        showStatus('Unsupported file. Use STL, OBJ, GLTF or GLB.', true);
        return;
      }
      currentFile = file;
      fileNameEl.textContent = file.name;
      fileInfo.classList.add('active');
      addModelBtn.disabled = false;
      showStatus('File ready.', false);
    }

    scaleSlider.addEventListener('input', e => scaleValue.textContent = e.target.value);
    rotationSlider.addEventListener('input', e => rotationValue.textContent = e.target.value + '°');

    addModelBtn.addEventListener('click', () => {
      if (!currentFile) return;
      const reader = new FileReader();
      reader.onload = e => {
        const modelData = {
          fileData: e.target.result,
          fileName: currentFile.name,
          fileType: currentFile.name.split('.').pop().toLowerCase()
        };
        const settings = {
          room: document.getElementById('roomSelect').value,
          position: {
            x: parseFloat(document.getElementById('posX').value),
            y: parseFloat(document.getElementById('posY').value),
            z: parseFloat(document.getElementById('posZ').value)
          },
          scale: parseFloat(scaleSlider.value),
          rotationY: parseFloat(rotationSlider.value),
          color: document.getElementById('colorPicker').value
        };
        addModelToScene(modelData, settings);
        showStatus('Model added!', false);
      };
      reader.readAsArrayBuffer(currentFile);
    });

    clearAllBtn.addEventListener('click', () => {
      if (!confirm('Remove all models from all rooms?')) return;
      rooms.forEach(r => {
        const c = document.getElementById(`${r.id}-models`);
        if (c) while (c.firstChild) c.removeChild(c.firstChild);
      });
      loadedModels = [];
      renderModelsList();
      showStatus('All models cleared.', false);
    });

    function addModelToScene(modelData, settings) {
      const { fileData, fileName, fileType } = modelData;
      const { room, position, scale, rotationY, color } = settings;
      const modelId = `model-${modelCounter++}`;
      const container = document.getElementById(`${room}-models`);
      if (!container) return;

      let entity;

      if (fileType === 'obj') {
        const url = URL.createObjectURL(new Blob([fileData], { type: 'text/plain' }));
        entity = document.createElement('a-entity');
        entity.setAttribute('obj-model', `obj: url(${url})`);
        entity.setAttribute('material', `color: ${color}`);
      } else if (fileType === 'gltf' || fileType === 'glb') {
        const type = fileType === 'glb' ? 'model/gltf-binary' : 'model/gltf+json';
        const url = URL.createObjectURL(new Blob([fileData], { type }));
        entity = document.createElement('a-entity');
        entity.setAttribute('gltf-model', `url(${url})`);
      } else {
        entity = document.createElement('a-entity');
        entity.setAttribute('geometry', 'primitive: box');
        entity.setAttribute('material', `color: ${color}`);
      }

      entity.setAttribute('id', modelId);
      entity.setAttribute('class', 'vr-grabbable');
      entity.setAttribute('position', `${position.x} ${position.y} ${position.z}`);
      entity.setAttribute('rotation', `0 ${rotationY} 0`);
      entity.setAttribute('scale', `${scale} ${scale} ${scale}`);
      container.appendChild(entity);

      loadedModels.push({ id: modelId, name: fileName, room });
      renderModelsList();
    }

    function removeModel(modelId) {
      const el = document.getElementById(modelId);
      if (el) el.remove();
      loadedModels = loadedModels.filter(m => m.id !== modelId);
      renderModelsList();
      showStatus('Model removed.', false);
    }

    function renderModelsList() {
      if (loadedModels.length === 0) {
        modelsList.innerHTML = '<p style="color:#7f8c8d;text-align:center;font-size:13px;">No models loaded yet</p>';
        return;
      }
      modelsList.innerHTML = '';
      loadedModels.forEach(model => {
        const roomName = (rooms.find(r => r.id === model.room) || {}).name || model.room;
        const item = document.createElement('div');
        item.className = 'model-item';
        item.innerHTML = `
          <span class="model-item-name" title="${model.name}">${model.name} <small style="color:#999">(${roomName})</small></span>
          <button class="model-item-remove" onclick="removeModel('${model.id}')">Remove</button>
        `;
        modelsList.appendChild(item);
      });
    }

    function showStatus(msg, isError) {
      statusMessage.textContent = msg;
      statusMessage.classList.add('active');
      statusMessage.classList.toggle('error', isError);
      setTimeout(() => statusMessage.classList.remove('active'), 3000);
    }

    // ── Undo / Redo history ───────────────────────────────────────
    const History = {
      _undo: [], _redo: [], MAX: 60,
      push(cmd) {
        this._undo.push(cmd);
        if (this._undo.length > this.MAX) this._undo.shift();
        this._redo = [];
        this._ui();
      },
      undo() {
        if (!this._undo.length) return;
        const cmd = this._undo.pop();
        cmd.undo();
        this._redo.push(cmd);
        this._ui();
      },
      redo() {
        if (!this._redo.length) return;
        const cmd = this._redo.pop();
        cmd.redo();
        this._undo.push(cmd);
        this._ui();
      },
      _ui() {
        const u = document.getElementById('undo-btn');
        const r = document.getElementById('redo-btn');
        if (u) u.disabled = !this._undo.length;
        if (r) r.disabled = !this._redo.length;
      }
    };

    // Snapshot the transform + dims of an entity
    function captureState(el, type) {
      const p = el.object3D.position, r = el.object3D.rotation, s = el.object3D.scale;
      const st = { px: p.x, py: p.y, pz: p.z, rx: r.x, ry: r.y, rz: r.z, sx: s.x, sy: s.y, sz: s.z };
      if (type === 'wall') {
        const w = walls.find(w => w.id === el.id);
        if (w) { st.width = w.width; st.height = w.height; st.depth = w.depth; }
      }
      return st;
    }

    // Apply a snapshot back to an entity
    function applyState(elId, type, st) {
      const el = document.getElementById(elId);
      if (!el) return;
      el.object3D.position.set(st.px, st.py, st.pz);
      el.object3D.rotation.set(st.rx, st.ry, st.rz);
      el.object3D.scale.set(st.sx, st.sy, st.sz);
      if (type === 'wall') {
        const w = walls.find(w => w.id === elId);
        if (w) {
          w.position.x = st.px; w.position.y = st.py; w.position.z = st.pz;
          w.rotY = THREE.MathUtils.radToDeg(st.ry);
          if (st.width  !== undefined) { w.width  = st.width;  el.setAttribute('width',  st.width);  }
          if (st.height !== undefined) { w.height = st.height; el.setAttribute('height', st.height); }
          if (st.depth  !== undefined) { w.depth  = st.depth;  el.setAttribute('depth',  st.depth);  }
        }
      }
      if (selectedEl && selectedEl.id === elId) refreshInspector();
      if (gizmo && gizmo.target && gizmo.target.id === elId) gizmo.update();
    }

    // Inspector change debounce — captures before/after for each typing session
    let _inspBefore = null, _inspTimer = null;
    function histInspectorChange() {
      if (!selectedEl) return;
      if (!_inspBefore || _inspBefore.id !== selectedEl.id) {
        _inspBefore = { id: selectedEl.id, type: selectedType, st: captureState(selectedEl, selectedType) };
      }
      clearTimeout(_inspTimer);
      _inspTimer = setTimeout(() => {
        const before = _inspBefore;
        const after  = captureState(selectedEl, selectedType);
        History.push({
          undo() { applyState(before.id, before.type, before.st); },
          redo() { applyState(before.id, before.type, after); }
        });
        _inspBefore = null;
      }, 700);
    }

    // ── Transform Gizmo ───────────────────────────────────────────
    const GC = { x: 0xe74c3c, y: 0x2ecc71, z: 0x3498db };  // base colors
    const GH = { x: 0xffaa00, y: 0x00ff88, z: 0x44aaff };  // hover/active colors

    class TransformGizmo {
      constructor() {
        this.target      = null;
        this.mode        = 'translate';
        this._drag       = null;
        this._hitStarted = false;
        this._rc         = new THREE.Raycaster();
        this._camera     = null;
        this._canvas     = null;
        this._handles    = []; // { mesh, axis, type }

        this.group   = new THREE.Group();
        this._tGroup = new THREE.Group();
        this._rGroup = new THREE.Group();
        this._sGroup = new THREE.Group();
        this.group.add(this._tGroup, this._rGroup, this._sGroup);
        this.group.visible = false;

        this._buildArrows();
        this._buildRings();
        this._buildScale();

        // White center sphere
        const cSph = new THREE.Mesh(
          new THREE.SphereGeometry(0.055, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false })
        );
        cSph.renderOrder = 999;
        this.group.add(cSph);
      }

      _mat(axis) {
        return new THREE.MeshBasicMaterial({ color: GC[axis] || 0xffffff, depthTest: false, transparent: true, opacity: 0.92 });
      }

      _buildArrows() {
        const shaft = new THREE.CylinderGeometry(0.022, 0.022, 0.52, 8);
        const cone  = new THREE.ConeGeometry(0.062, 0.18, 8);
        const cfg   = [
          { axis: 'x', sP:[0.26,0,0], sR:[0,0,-Math.PI/2], cP:[0.61,0,0], cR:[0,0,-Math.PI/2] },
          { axis: 'y', sP:[0,0.26,0], sR:[0,0,0],           cP:[0,0.61,0], cR:[0,0,0]           },
          { axis: 'z', sP:[0,0,0.26], sR:[Math.PI/2,0,0],   cP:[0,0,0.61], cR:[Math.PI/2,0,0]  },
        ];
        cfg.forEach(({ axis, sP, sR, cP, cR }) => {
          [shaft, cone].forEach((geo, i) => {
            const m = new THREE.Mesh(geo.clone(), this._mat(axis));
            m.position.set(...(i === 0 ? sP : cP));
            m.rotation.set(...(i === 0 ? sR : cR));
            m.renderOrder = 999;
            m.userData = { axis, type: 'translate' };
            this._tGroup.add(m);
            this._handles.push({ mesh: m, axis, type: 'translate' });
          });
        });
      }

      _buildScale() {
        const shaft = new THREE.CylinderGeometry(0.022, 0.022, 0.52, 8);
        const box   = new THREE.BoxGeometry(0.11, 0.11, 0.11);
        const cfg   = [
          { axis: 'x', sP:[0.26,0,0], sR:[0,0,-Math.PI/2], bP:[0.61,0,0] },
          { axis: 'y', sP:[0,0.26,0], sR:[0,0,0],           bP:[0,0.61,0] },
          { axis: 'z', sP:[0,0,0.26], sR:[Math.PI/2,0,0],   bP:[0,0,0.61] },
        ];
        cfg.forEach(({ axis, sP, sR, bP }) => {
          const sm = new THREE.Mesh(shaft.clone(), this._mat(axis));
          sm.position.set(...sP); sm.rotation.set(...sR);
          sm.renderOrder = 999; sm.userData = { axis, type: 'scale' };

          const bm = new THREE.Mesh(box.clone(), this._mat(axis));
          bm.position.set(...bP);
          bm.renderOrder = 999; bm.userData = { axis, type: 'scale' };

          this._sGroup.add(sm, bm);
          this._handles.push({ mesh: sm, axis, type: 'scale' });
          this._handles.push({ mesh: bm, axis, type: 'scale' });
        });

        // Centre white box for uniform scale
        const cm = new THREE.Mesh(
          new THREE.BoxGeometry(0.13, 0.13, 0.13),
          new THREE.MeshBasicMaterial({ color: 0xffffff, depthTest: false, opacity: 0.9, transparent: true })
        );
        cm.renderOrder = 999; cm.userData = { axis: 'xyz', type: 'scale' };
        this._sGroup.add(cm);
        this._handles.push({ mesh: cm, axis: 'xyz', type: 'scale' });
      }

      _buildRings() {
        const geo = new THREE.TorusGeometry(0.78, 0.038, 8, 56);
        const cfg = [
          { axis: 'x', rot: [0, Math.PI/2, 0] },
          { axis: 'y', rot: [Math.PI/2, 0, 0]  },
          { axis: 'z', rot: [0, 0, 0]           },
        ];
        cfg.forEach(({ axis, rot }) => {
          const m = new THREE.Mesh(geo.clone(), this._mat(axis));
          m.rotation.set(...rot);
          m.renderOrder = 999;
          m.userData = { axis, type: 'rotate' };
          this._rGroup.add(m);
          this._handles.push({ mesh: m, axis, type: 'rotate' });
        });
      }

      init(sceneObj3D, camera, canvas) {
        this._camera = camera;
        this._canvas = canvas;
        sceneObj3D.add(this.group);
      }

      attach(el) {
        this.target = el;
        this.group.visible = true;
        this._applyMode();
        this.update();
      }

      detach() {
        this.target = null;
        this.group.visible = false;
        this._drag = null;
        this._hitStarted = false;
      }

      setMode(mode) {
        this.mode = mode;
        this._applyMode();
        document.querySelectorAll('.gizmo-mode-btn').forEach(b => {
          b.classList.toggle('active', b.dataset.mode === mode);
        });
      }

      _applyMode() {
        this._tGroup.visible = this.mode === 'translate';
        this._rGroup.visible = this.mode === 'rotate';
        this._sGroup.visible = this.mode === 'scale';
      }

      update() {
        if (!this.target || !this._camera) return;
        const wp = new THREE.Vector3();
        this.target.object3D.getWorldPosition(wp);
        this.group.position.copy(wp);
        const cp = new THREE.Vector3();
        this._camera.getWorldPosition(cp);
        const s = Math.max(0.25, cp.distanceTo(wp) * 0.19);
        this.group.scale.setScalar(s);
      }

      _ndc(e) {
        const r = this._canvas.getBoundingClientRect();
        return new THREE.Vector2(
          ((e.clientX - r.left) / r.width)  * 2 - 1,
          -((e.clientY - r.top) / r.height) * 2 + 1
        );
      }

      _activeHandles() {
        return this._handles.filter(h => h.type === this.mode).map(h => h.mesh);
      }

      // Closest t along lineDir from linePoint to the given ray
      _lineT(ray, linePoint, lineDir) {
        const w = new THREE.Vector3().subVectors(ray.origin, linePoint);
        const b = lineDir.dot(ray.direction);
        const denom = 1 - b * b;
        if (Math.abs(denom) < 1e-10) return 0;
        return (lineDir.dot(w) - b * ray.direction.dot(w)) / denom;
      }

      // Ray–plane intersection point
      _rayPlane(ray, normal, point) {
        const denom = normal.dot(ray.direction);
        if (Math.abs(denom) < 1e-6) return null;
        const t = normal.dot(new THREE.Vector3().subVectors(point, ray.origin)) / denom;
        return t < 0 ? null : ray.origin.clone().addScaledVector(ray.direction, t);
      }

      _angleOnPlane(axis, v) {
        if (axis === 'x') return Math.atan2(v.z, v.y);
        if (axis === 'y') return Math.atan2(v.x, v.z);
        return Math.atan2(v.y, v.x);
      }

      _axisVec(axis) {
        return new THREE.Vector3(axis==='x'?1:0, axis==='y'?1:0, axis==='z'?1:0);
      }

      onMouseDown(e) {
        if (!this.target || !this.group.visible) return false;
        const ndc = this._ndc(e);
        this._rc.setFromCamera(ndc, this._camera);
        const hits = this._rc.intersectObjects(this._activeHandles(), false);
        if (!hits.length) return false;

        this._hitStarted = true;
        // Snapshot before-state for history
        this._histBefore = selectedEl ? { id: selectedEl.id, type: selectedType, st: captureState(selectedEl, selectedType) } : null;
        const { axis, type } = hits[0].object.userData;

        // Highlight active axis handles
        this._handles.forEach(h => {
          h.mesh.material.color.setHex(h.axis === axis && h.type === type ? (GH[axis] || 0xffff00) : (GC[h.axis] || 0xffffff));
        });

        const wp = new THREE.Vector3();
        this.target.object3D.getWorldPosition(wp);
        const av = this._axisVec(axis);

        if (type === 'translate') {
          this._drag = {
            type, axis, av,
            startWorld: wp.clone(),
            startT: this._lineT(this._rc.ray, wp, av),
          };
        } else if (type === 'rotate') {
          const hitPt = this._rayPlane(this._rc.ray, av, wp);
          if (!hitPt) return true;
          const toHit = new THREE.Vector3().subVectors(hitPt, wp).normalize();
          this._drag = {
            type, axis, av, center: wp.clone(),
            startAngle: this._angleOnPlane(axis, toHit),
            startRot: { x: this.target.object3D.rotation.x, y: this.target.object3D.rotation.y, z: this.target.object3D.rotation.z },
          };
        } else { // scale
          const wallData = selectedType === 'wall' ? walls.find(w => w.id === this.target.id) : null;
          this._drag = {
            type, axis,
            startNDC: this._ndc(e),
            startScale: this.target.object3D.scale.clone(),
            startDim: wallData ? { x: wallData.width, y: wallData.height, z: wallData.depth } : null,
          };
        }
        return true;
      }

      onMouseMove(e) {
        if (!this._drag || !this.target) return;
        const ndc = this._ndc(e);
        this._rc.setFromCamera(ndc, this._camera);
        const d = this._drag;

        if (d.type === 'translate') {
          const t     = this._lineT(this._rc.ray, d.startWorld, d.av);
          const delta = t - d.startT;
          const newW  = d.startWorld.clone().addScaledVector(d.av, delta);

          // Convert world pos → parent local space
          const parent = this.target.object3D.parent;
          if (parent) {
            const inv = new THREE.Matrix4().copy(parent.matrixWorld).invert();
            newW.applyMatrix4(inv);
          }
          this.target.object3D.position.copy(newW);

          if (selectedType === 'wall') {
            const p = this.target.object3D.position;
            const w = walls.find(w => w.id === this.target.id);
            if (w) { w.position.x = p.x; w.position.y = p.y; w.position.z = p.z; }
          }

        } else if (d.type === 'rotate') {
          const hitPt = this._rayPlane(this._rc.ray, d.av, d.center);
          if (!hitPt) return;
          const toHit = new THREE.Vector3().subVectors(hitPt, d.center).normalize();
          const delta = this._angleOnPlane(d.axis, toHit) - d.startAngle;
          const rot   = this.target.object3D.rotation;
          rot.x = d.startRot.x + (d.axis === 'x' ? delta : 0);
          rot.y = d.startRot.y + (d.axis === 'y' ? delta : 0);
          rot.z = d.startRot.z + (d.axis === 'z' ? delta : 0);

          if (selectedType === 'wall') {
            const w = walls.find(w => w.id === this.target.id);
            if (w) w.rotY = THREE.MathUtils.radToDeg(rot.y);
          }

        } else { // scale — vertical drag: up = bigger, down = smaller
          const dy     = ndc.y - d.startNDC.y;
          const factor = Math.max(0.02, 1 + dy * 2.5);
          const axes   = d.axis === 'xyz' ? ['x','y','z'] : [d.axis];

          if (d.startDim) { // wall: scale via geometry attributes
            const w = walls.find(w => w.id === this.target.id);
            if (w) {
              if (axes.includes('x')) { w.width  = Math.max(0.1,  d.startDim.x * factor); this.target.setAttribute('width',  w.width);  }
              if (axes.includes('y')) { w.height = Math.max(0.1,  d.startDim.y * factor); this.target.setAttribute('height', w.height); }
              if (axes.includes('z')) { w.depth  = Math.max(0.05, d.startDim.z * factor); this.target.setAttribute('depth',  w.depth);  }
            }
          } else { // model: use object3D scale
            const s = d.startScale.clone();
            if (axes.includes('x')) s.x = Math.max(0.01, d.startScale.x * factor);
            if (axes.includes('y')) s.y = Math.max(0.01, d.startScale.y * factor);
            if (axes.includes('z')) s.z = Math.max(0.01, d.startScale.z * factor);
            this.target.object3D.scale.copy(s);
          }
        }

        this.update();
        refreshInspector();
      }

      onMouseUp() {
        if (!this._drag) return;
        this._handles.forEach(h => h.mesh.material.color.setHex(GC[h.axis] || 0xffffff));
        // Push history if transform changed
        if (this._histBefore && this.target) {
          const b = this._histBefore;
          const after = captureState(this.target, selectedType);
          const changed = ['px','py','pz','rx','ry','rz','sx','sy','sz','width','height','depth']
            .some(k => Math.abs((b.st[k] || 0) - (after[k] || 0)) > 1e-5);
          if (changed) {
            History.push({
              undo() { applyState(b.id, b.type, b.st); },
              redo() { applyState(b.id, b.type, after); }
            });
          }
          this._histBefore = null;
        }
        this._drag = null;
      }
    }

    let gizmo; // initialized after scene loads

    // ── Object Inspector — click-to-select in desktop browser ─────
    let selectedEl   = null;
    let selectedType = null; // 'wall' | 'model'

    function selectObject(el, type) {
      if (selectedEl === el) return;
      if (selectedEl) deselectObject(false);
      selectedEl   = el;
      selectedType = type;

      // Emissive highlight
      el.object3D.traverse(child => {
        if (!child.isMesh) return;
        if (!child.userData._origEmissive) {
          child.userData._origEmissive = child.material.emissive
            ? child.material.emissive.clone() : new THREE.Color(0, 0, 0);
        }
        child.material.emissive = new THREE.Color(0.15, 0.15, 0.0);
        child.material.emissiveIntensity = 1;
      });

      if (gizmo) gizmo.attach(el);
      refreshInspector();
      document.getElementById('obj-inspector').style.display = 'block';
    }

    function deselectObject(hide) {
      if (hide === undefined) hide = true;
      if (!selectedEl) return;
      selectedEl.object3D.traverse(child => {
        if (!child.isMesh || !child.userData._origEmissive) return;
        child.material.emissive.copy(child.userData._origEmissive);
        child.material.emissiveIntensity = 0;
      });
      selectedEl   = null;
      selectedType = null;
      if (gizmo) gizmo.detach();
      if (hide) document.getElementById('obj-inspector').style.display = 'none';
    }

    function refreshInspector() {
      if (!selectedEl) return;
      const pos = selectedEl.object3D.position;
      const rot = selectedEl.object3D.rotation;

      document.getElementById('obj-px').value = +pos.x.toFixed(3);
      document.getElementById('obj-py').value = +pos.y.toFixed(3);
      document.getElementById('obj-pz').value = +pos.z.toFixed(3);
      document.getElementById('obj-rx').value = +THREE.MathUtils.radToDeg(rot.x).toFixed(1);
      document.getElementById('obj-ry').value = +THREE.MathUtils.radToDeg(rot.y).toFixed(1);
      document.getElementById('obj-rz').value = +THREE.MathUtils.radToDeg(rot.z).toFixed(1);

      if (selectedType === 'wall') {
        const w = walls.find(w => w.id === selectedEl.id);
        document.getElementById('obj-insp-name').textContent = `Wall — ${selectedEl.id}`;
        document.getElementById('insp-wall-dims').style.display = 'flex';
        document.getElementById('insp-scale-row').style.display = 'none';
        if (w) {
          document.getElementById('obj-ww').value = w.width;
          document.getElementById('obj-wh').value = w.height;
          document.getElementById('obj-wd').value = w.depth;
        }
      } else {
        const m = loadedModels.find(m => m.id === selectedEl.id);
        document.getElementById('obj-insp-name').textContent = m ? m.name : selectedEl.id;
        document.getElementById('insp-wall-dims').style.display = 'none';
        document.getElementById('insp-scale-row').style.display = 'flex';
        const s = selectedEl.object3D.scale;
        document.getElementById('obj-scale').value = +s.x.toFixed(3);
      }
    }

    // ── Inspector input handlers ───────────────────────────────────
    function applyInspectorPos() {
      if (!selectedEl) return;
      histInspectorChange();
      const x = parseFloat(document.getElementById('obj-px').value) || 0;
      const y = parseFloat(document.getElementById('obj-py').value) || 0;
      const z = parseFloat(document.getElementById('obj-pz').value) || 0;
      selectedEl.object3D.position.set(x, y, z);
      if (selectedType === 'wall') {
        const w = walls.find(w => w.id === selectedEl.id);
