        if (w) { w.position.x = x; w.position.y = y; w.position.z = z; }
      }
    }

    function applyInspectorRot() {
      if (!selectedEl) return;
      histInspectorChange();
      const rx = parseFloat(document.getElementById('obj-rx').value) || 0;
      const ry = parseFloat(document.getElementById('obj-ry').value) || 0;
      const rz = parseFloat(document.getElementById('obj-rz').value) || 0;
      selectedEl.object3D.rotation.set(
        THREE.MathUtils.degToRad(rx),
        THREE.MathUtils.degToRad(ry),
        THREE.MathUtils.degToRad(rz)
      );
      if (selectedType === 'wall') {
        const w = walls.find(w => w.id === selectedEl.id);
        if (w) w.rotY = ry;
      }
    }

    function applyInspectorDims() {
      if (!selectedEl || selectedType !== 'wall') return;
      histInspectorChange();
      const w = walls.find(w => w.id === selectedEl.id);
      if (!w) return;
      const width  = Math.max(0.1, parseFloat(document.getElementById('obj-ww').value) || 0.1);
      const height = Math.max(0.1, parseFloat(document.getElementById('obj-wh').value) || 0.1);
      const depth  = Math.max(0.05, parseFloat(document.getElementById('obj-wd').value) || 0.05);
      w.width = width; w.height = height; w.depth = depth;
      selectedEl.setAttribute('width',  width);
      selectedEl.setAttribute('height', height);
      selectedEl.setAttribute('depth',  depth);
    }

    function applyInspectorScale() {
      if (!selectedEl || selectedType !== 'model') return;
      histInspectorChange();
      const s = Math.max(0.01, parseFloat(document.getElementById('obj-scale').value) || 0.01);
      selectedEl.object3D.scale.set(s, s, s);
    }

    // ── Canvas mouse → gizmo + object selection ───────────────────
    function findSelectableAncestor(obj3d) {
      let cur = obj3d;
      while (cur) {
        if (cur.el && cur.el.classList &&
            (cur.el.classList.contains('vr-wall') || cur.el.classList.contains('vr-grabbable'))) {
          return cur.el;
        }
        cur = cur.parent;
      }
      return null;
    }

    function initObjectPicker() {
      const scene  = document.querySelector('a-scene');
      const canvas = scene.canvas;
      const rc     = new THREE.Raycaster();
      const mouse  = new THREE.Vector2();

      canvas.addEventListener('mousedown', (e) => {
        if (scene.is('vr-mode')) return;
        gizmo.onMouseDown(e);
      });

      canvas.addEventListener('mousemove', (e) => {
        if (scene.is('vr-mode')) return;
        gizmo.onMouseMove(e);
      });

      canvas.addEventListener('mouseup', (e) => {
        gizmo.onMouseUp(e);
      });

      canvas.addEventListener('click', (e) => {
        if (scene.is('vr-mode')) return;
        // Gizmo consumed this interaction — don't change selection
        if (gizmo._hitStarted) { gizmo._hitStarted = false; return; }

        const rect = canvas.getBoundingClientRect();
        mouse.x =  ((e.clientX - rect.left) / rect.width)  * 2 - 1;
        mouse.y = -((e.clientY - rect.top)  / rect.height) * 2 + 1;

        rc.setFromCamera(mouse, scene.camera);

        const selectableEls = [...document.querySelectorAll('.vr-wall, .vr-grabbable')];
        const meshes = [];
        selectableEls.forEach(el => {
          el.object3D.traverse(child => { if (child.isMesh) meshes.push(child); });
        });

        const hits = rc.intersectObjects(meshes, false);
        if (hits.length > 0) {
          const found = findSelectableAncestor(hits[0].object);
          if (found) {
            selectObject(found, found.classList.contains('vr-wall') ? 'wall' : 'model');
            return;
          }
        }
        deselectObject();
      });
    }

    // ── Duplicate selected object ─────────────────────────────────
    function duplicateObject() {
      if (!selectedEl || !selectedType) return;

      if (selectedType === 'wall') {
        const w = walls.find(w => w.id === selectedEl.id);
        if (!w) return;

        // Offset along wall's own local +X axis (width direction) with a small gap
        const gap    = 0.12;
        const offset = new THREE.Vector3(w.width + gap, 0, 0);
        const wQuat  = new THREE.Quaternion();
        selectedEl.object3D.getWorldQuaternion(wQuat);
        offset.applyQuaternion(wQuat);

        const newPos = {
          x: w.position.x + offset.x,
          y: w.position.y + offset.y,
          z: w.position.z + offset.z,
        };
        const rotY = THREE.MathUtils.radToDeg(selectedEl.object3D.rotation.y);
        const id   = `vr-wall-${wallCounter++}`;

        const newWall = { id, room: w.room, color: w.color,
          width: w.width, height: w.height, depth: w.depth,
          position: { ...newPos }, rotY };
        _addWallToScene(newWall);
        const saved = JSON.parse(JSON.stringify(newWall));
        History.push({
          undo() { _removeWallFromScene(saved.id); },
          redo() { _addWallToScene(JSON.parse(JSON.stringify(saved))); }
        });
        const dupEl = document.getElementById(id);
        if (dupEl) setTimeout(() => selectObject(dupEl, 'wall'), 80);
        showStatus('Wall duplicated.', false);

      } else if (selectedType === 'model') {
        const m = loadedModels.find(m => m.id === selectedEl.id);
        if (!m) return;

        // Compute bounding box so we can place copy flush + gap
        const bbox = new THREE.Box3().setFromObject(selectedEl.object3D);
        const size = new THREE.Vector3();
        bbox.getSize(size);
        const gap = 0.12;
        const dx  = (size.x > 0 ? size.x : 1) + gap;

        const pos = selectedEl.object3D.position;
        const rot = selectedEl.object3D.rotation;
        const sc  = selectedEl.object3D.scale;

        // Clone the element — preserves gltf-model / obj-model src attributes
        const newEl = selectedEl.cloneNode(true);
        const newId = `model-${modelCounter++}`;
        newEl.setAttribute('id',    newId);
        newEl.setAttribute('class', 'vr-grabbable');
        newEl.setAttribute('position', `${pos.x + dx} ${pos.y} ${pos.z}`);
        newEl.setAttribute('rotation', `${THREE.MathUtils.radToDeg(rot.x)} ${THREE.MathUtils.radToDeg(rot.y)} ${THREE.MathUtils.radToDeg(rot.z)}`);
        newEl.setAttribute('scale',    `${sc.x} ${sc.y} ${sc.z}`);

        const container = document.getElementById(`${m.room}-models`);
        if (container) {
          container.appendChild(newEl);
          const entry = { id: newId, name: m.name + ' (copy)', room: m.room };
          loadedModels.push(entry);
          renderModelsList();
          History.push({
            undo() {
              const el2 = document.getElementById(newId);
              if (el2 && selectedEl === el2) deselectObject();
              if (el2) el2.remove();
              loadedModels = loadedModels.filter(x => x.id !== newId);
              renderModelsList();
            },
            redo() {
              const c2 = document.getElementById(`${entry.room}-models`);
              if (c2) { const clone = newEl.cloneNode(true); c2.appendChild(clone); loadedModels.push({ ...entry }); renderModelsList(); }
            }
          });
          setTimeout(() => selectObject(newEl, 'model'), 80);
        }
        showStatus('Model duplicated.', false);
      }
    }

    // ── Init ──────────────────────────────────────────────────────
    document.querySelector('a-scene').addEventListener('loaded', () => {
      renderScene();
      renderRoomsList();
      renderRoomSelect();
      renderWallRoomSelect();
      renderWallsList();

      const scene = document.querySelector('a-scene');
      gizmo = new TransformGizmo();
      gizmo.init(scene.object3D, scene.camera, scene.canvas);

      // Keyboard shortcuts for undo / redo
      window.addEventListener('keydown', e => {
        const tag = document.activeElement.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
        if (e.ctrlKey || e.metaKey) {
          if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); History.undo(); }
          if (e.key === 'y' || e.key === 'Y') { e.preventDefault(); History.redo(); }
          if ((e.key === 'z' || e.key === 'Z') && e.shiftKey) { e.preventDefault(); History.redo(); }
        }
      });

      initObjectPicker();

      // Keep gizmo position/scale in sync every frame
      (function loop() { requestAnimationFrame(loop); if (gizmo) gizmo.update(); })();
    });
  </script>
</body>
</html>
