<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VR Room Viewer</title>
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }

    #info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(44, 62, 80, 0.9);
      padding: 15px;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      z-index: 1000;
    }

    #info-panel h3 { margin: 0 0 10px; color: #4CC3D9; }

    #info-panel button {
      background: #4CC3D9;
      color: white;
      border: none;
      padding: 8px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }

    #info-panel button:hover { background: #3AB0C7; }

    #editor-panel {
      position: fixed;
      top: 0;
      right: -470px;
      width: 450px;
      height: 100vh;
      overflow-y: auto;
      z-index: 2000;
      transition: right 0.3s ease;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
    }

    #editor-panel.open { right: 0; }

    .editor-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      overflow: hidden;
    }

    .editor-header {
      background: #2C3E50;
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
    }

    .editor-header h1 { margin: 0; font-size: 22px; }
    .editor-header p { margin: 5px 0 0; opacity: 0.8; font-size: 13px; }

    #close-editor {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
    }

    #close-editor:hover { background: rgba(255,255,255,0.35); }

    .editor-content { padding: 20px; }

    .section {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 2px solid #ecf0f1;
    }

    .section:last-child { border-bottom: none; margin-bottom: 0; }

    .section h2 {
      margin: 0 0 15px;
      color: #2C3E50;
      font-size: 16px;
      display: flex;
      align-items: center;
    }

    .section h2::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 18px;
      background: #667eea;
      margin-right: 10px;
      border-radius: 2px;
    }

    /* Room list */
    .room-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8f9fa;
      padding: 8px 10px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .room-color-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .room-name-input {
      flex: 1;
      border: 1px solid #ecf0f1;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 13px;
      color: #2C3E50;
    }

    .room-name-input:focus { outline: none; border-color: #667eea; }

    .room-rename-btn {
      background: #667eea !important;
      color: white;
      border: none;
      padding: 5px 10px !important;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      width: auto !important;
      white-space: nowrap;
    }

    .room-rename-btn:hover { background: #5a6fd6 !important; transform: none !important; }

    .room-delete-btn {
      background: #e74c3c !important;
      color: white;
      border: none;
      padding: 5px 10px !important;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      width: auto !important;
    }

    .room-delete-btn:hover { background: #c0392b !important; transform: none !important; }

    /* Create room form */
    .create-room-form {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 12px;
    }

    .create-room-form input[type="text"] {
      flex: 1;
      padding: 9px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      font-size: 13px;
    }

    .create-room-form input[type="text"]:focus { outline: none; border-color: #667eea; }

    .create-room-form input[type="color"] {
      width: 40px;
      height: 38px;
      padding: 2px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      cursor: pointer;
    }

    /* File upload */
    .file-upload-area {
      border: 3px dashed #bdc3c7;
      border-radius: 10px;
      padding: 25px;
      text-align: center;
      background: #f8f9fa;
      cursor: pointer;
      transition: all 0.3s;
    }

    .file-upload-area:hover, .file-upload-area.drag-over {
      border-color: #667eea;
      background: #f0f0ff;
    }

    .file-upload-area input { display: none; }
    .upload-icon { font-size: 40px; margin-bottom: 8px; }
    .upload-text { color: #7f8c8d; font-size: 13px; }

    .file-info {
      background: #e8f5e9;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
      font-size: 13px;
    }

    .file-info.active { display: block; }
    .file-info strong { color: #27ae60; }

    .control-group { margin-bottom: 12px; }

    .control-group label {
      display: block;
      margin-bottom: 4px;
      color: #34495e;
      font-weight: 600;
      font-size: 13px;
    }

    .control-group select,
    .control-group input[type="color"] {
      width: 100%;
      padding: 9px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      font-size: 13px;
    }

    .position-inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .position-inputs input {
      padding: 9px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      text-align: center;
      font-size: 13px;
      width: 100%;
    }

    .slider-container { display: flex; align-items: center; gap: 10px; }

    .slider-container input[type="range"] {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: #ecf0f1;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
    }

    .slider-container input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #667eea;
      cursor: pointer;
      border: none;
    }

    .slider-value { min-width: 45px; text-align: center; font-weight: 600; color: #667eea; font-size: 13px; }

    #editor-panel button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      margin-bottom: 10px;
    }

    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
    .btn-primary:disabled { background: #95a5a6; cursor: not-allowed; }

    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; transform: translateY(-1px); }

    .models-list { max-height: 180px; overflow-y: auto; margin-top: 12px; }

    .model-item {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .model-item-name {
      flex: 1;
      font-size: 13px;
      color: #2C3E50;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .model-item-remove {
      background: #e74c3c !important;
      color: white;
      border: none;
      padding: 5px 10px !important;
      border-radius: 5px;
      cursor: pointer;
      font-size: 12px;
      width: auto !important;
      margin-bottom: 0 !important;
    }

    .model-item-remove:hover { background: #c0392b !important; transform: none !important; }

    .status-message {
      background: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 8px;
      margin-top: 12px;
      display: none;
      font-size: 13px;
      border: 1px solid #c3e6cb;
    }

    .status-message.active { display: block; }
    .status-message.error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
  </style>
</head>
<body>

  <div id="info-panel">
    <h3>VR Room Viewer</h3>
    <button onclick="toggleEditor()">Editor</button>
  </div>

  <div id="editor-panel">
    <div class="editor-container">
      <div class="editor-header">
        <button id="close-editor" onclick="toggleEditor()">&#x2715;</button>
        <h1>Scene Editor</h1>
        <p>Manage rooms and 3D models</p>
      </div>
      <div class="editor-content">

        <!-- Rooms section -->
        <div class="section">
          <h2>Rooms</h2>
          <div id="roomsList"></div>
          <div class="create-room-form">
            <input type="text" id="newRoomName" placeholder="Room name">
            <input type="color" id="newRoomColor" value="#4682B4" title="Wall color">
            <button class="btn-primary" style="width:auto;padding:9px 14px;margin-bottom:0;" onclick="createRoom()">+ Add</button>
          </div>
        </div>

        <!-- Upload section -->
        <div class="section">
          <h2>Upload Model</h2>
          <div class="file-upload-area" id="dropArea">
            <input type="file" id="fileInput" accept=".stl,.obj,.gltf,.glb">
            <div class="upload-icon">📦</div>
            <div class="upload-text">
              <strong>Click to browse</strong> or drag & drop<br>
              <small>STL, OBJ, GLTF, GLB supported</small>
            </div>
          </div>
          <div class="file-info" id="fileInfo">
            <strong>Selected:</strong> <span id="fileName"></span>
          </div>
        </div>

        <!-- Model settings section -->
        <div class="section">
          <h2>Model Settings</h2>
          <div class="control-group">
            <label>Target Room</label>
            <select id="roomSelect"></select>
          </div>
          <div class="control-group">
            <label>Position (X, Y, Z)</label>
            <div class="position-inputs">
              <input type="number" id="posX" value="0" step="0.1" placeholder="X">
              <input type="number" id="posY" value="1" step="0.1" placeholder="Y">
              <input type="number" id="posZ" value="-3" step="0.1" placeholder="Z">
            </div>
          </div>
          <div class="control-group">
            <label>Scale</label>
            <div class="slider-container">
              <input type="range" id="scaleSlider" min="0.1" max="5" step="0.1" value="1">
              <span class="slider-value" id="scaleValue">1.0</span>
            </div>
          </div>
          <div class="control-group">
            <label>Rotation Y</label>
            <div class="slider-container">
              <input type="range" id="rotationSlider" min="0" max="360" step="15" value="0">
              <span class="slider-value" id="rotationValue">0°</span>
            </div>
          </div>
          <div class="control-group">
            <label>Color</label>
            <input type="color" id="colorPicker" value="#ffffff">
          </div>
        </div>

        <!-- Actions section -->
        <div class="section">
          <h2>Actions</h2>
          <button class="btn-primary" id="addModelBtn" disabled>Add to Scene</button>
          <button class="btn-danger" id="clearAllBtn">Clear All Models</button>
          <div class="status-message" id="statusMessage"></div>
        </div>

        <!-- Loaded models section -->
        <div class="section">
          <h2>Loaded Models</h2>
          <div class="models-list" id="modelsList">
            <p style="color:#7f8c8d;text-align:center;font-size:13px;">No models loaded yet</p>
          </div>
        </div>

      </div>
    </div>
  </div>

  <a-scene>
    <a-entity id="rig" position="0 0 0" wasd-controls room-collider>

      <a-camera look-controls wasd-controls="enabled: false">
        <!-- Desktop mouse cursor -->
        <a-cursor cursor="rayOrigin: mouse"
          raycaster="objects: [data-room]; far: 100"
          color="#4CC3D9" opacity="0.8">
        </a-cursor>
      </a-camera>

      <!-- Left controller — thumbstick up: arc teleport | L/R: snap turn | trigger: click -->
      <a-entity id="left-controller"
        oculus-touch-controls="hand: left"
        vive-controls="hand: left"
        raycaster="objects: [data-room], .clickable; far: 10; showLine: true"
        line="color: #4CC3D9; opacity: 0.8"
        arc-teleporter
        snap-turn
        vr-pointer
        smart-laser>
      </a-entity>

      <!-- Right controller — thumbstick up: arc teleport | L/R: snap turn | trigger: click -->
      <a-entity id="right-controller"
        oculus-touch-controls="hand: right"
        vive-controls="hand: right"
        raycaster="objects: [data-room], .clickable; far: 10; showLine: true"
        line="color: #4CC3D9; opacity: 0.8"
        arc-teleporter
        snap-turn
        vr-pointer
        smart-laser>
      </a-entity>

    </a-entity>
    <a-sky id="sky" color="#87CEEB"></a-sky>
    <a-entity id="rooms-container"></a-entity>
    <a-entity id="menu-panel" position="3 1.5 -2"></a-entity>
    <a-light type="ambient" color="#BBB"></a-light>
    <a-light type="directional" color="#FFF" intensity="0.6" position="-0.5 1 1"></a-light>
  </a-scene>

  <script>
    // ── Arc teleporter component ──────────────────────────────────
    AFRAME.registerComponent('arc-teleporter', {
      init: function () {
        this.rig = document.getElementById('rig');
        this.active = false;
        this.landingPoint = null;
        this.tmpQuat = new THREE.Quaternion();

        const scene = this.el.sceneEl;

        // Arc dots
        this.dots = [];
        for (let i = 0; i < 30; i++) {
          const dot = document.createElement('a-sphere');
          dot.setAttribute('radius', '0.04');
          dot.setAttribute('color', '#4CC3D9');
          dot.setAttribute('segments-height', '4');
          dot.setAttribute('segments-width', '4');
          dot.object3D.visible = false;
          scene.appendChild(dot);
          this.dots.push(dot);
        }

        // Landing ring
        this.ring = document.createElement('a-ring');
        this.ring.setAttribute('radius-inner', '0.2');
        this.ring.setAttribute('radius-outer', '0.45');
        this.ring.setAttribute('color', '#4CC3D9');
        this.ring.setAttribute('rotation', '-90 0 0');
        this.ring.setAttribute('material', 'side: double; opacity: 0.8');
        this.ring.object3D.visible = false;
        scene.appendChild(this.ring);

        this.el.addEventListener('thumbstickmoved', (evt) => {
          const y = evt.detail.y;
          if (y < -0.7 && !this.active) {
            this.active = true;
          }
          if (Math.abs(y) < 0.2 && this.active) {
            this.doTeleport();
          }
        });
      },

      tick: function () {
        if (!this.active) return;

        const origin = new THREE.Vector3();
        const dir    = new THREE.Vector3(0, 0, -1);

        this.el.object3D.getWorldPosition(origin);
        this.el.object3D.getWorldQuaternion(this.tmpQuat);
        dir.applyQuaternion(this.tmpQuat).normalize();

        const speed   = 8;
        const gravity = -9.8;
        const dt      = 0.08;

        const vx = dir.x * speed;
        const vy = dir.y * speed;
        const vz = dir.z * speed;

        this.landingPoint = null;
        let hitIndex = this.dots.length;
        let prevY = origin.y;

        for (let i = 0; i < this.dots.length; i++) {
          const t = i * dt;
          const x = origin.x + vx * t;
          const y = origin.y + vy * t + 0.5 * gravity * t * t;
          const z = origin.z + vz * t;

          if (!this.landingPoint && y <= 0.01 && prevY > 0.01) {
            this.landingPoint = new THREE.Vector3(
              Math.max(-4.6, Math.min(4.6, x)),
              0,
              Math.max(-4.6, Math.min(4.6, z))
            );
            hitIndex = i;
          }

          if (i < hitIndex) {
            this.dots[i].object3D.visible = true;
            this.dots[i].object3D.position.set(x, y, z);
          } else {
            this.dots[i].object3D.visible = false;
          }

          prevY = y;
        }

        if (this.landingPoint) {
          this.ring.object3D.visible = true;
          this.ring.object3D.position.set(this.landingPoint.x, 0.01, this.landingPoint.z);
        } else {
          this.ring.object3D.visible = false;
        }
      },

      doTeleport: function () {
        if (this.landingPoint) {
          this.rig.object3D.position.set(this.landingPoint.x, 0, this.landingPoint.z);
        }
        this.active = false;
        this.landingPoint = null;
        this.dots.forEach(d => { d.object3D.visible = false; });
        this.ring.object3D.visible = false;
      },

      remove: function () {
        this.dots.forEach(d => d.parentNode && d.parentNode.removeChild(d));
        if (this.ring.parentNode) this.ring.parentNode.removeChild(this.ring);
      }
    });

    // ── VR pointer — trigger fires click on intersected element ───
    AFRAME.registerComponent('vr-pointer', {
      init: function () {
        this.el.addEventListener('triggerdown', () => {
          const rc = this.el.components.raycaster;
          if (rc && rc.intersectedEls.length > 0) {
            rc.intersectedEls[0].emit('click');
          }
        });
      }
    });

    // ── Smart laser — line only visible when hitting an object ────
    AFRAME.registerComponent('smart-laser', {
      init: function () {
        this.wasHitting = false;
      },
      tick: function () {
        const rc = this.el.components.raycaster;
        if (!rc) return;
        const hitting = rc.intersectedEls.length > 0;
        if (hitting === this.wasHitting) return;
        this.wasHitting = hitting;
        const lineObj = this.el.getObject3D('line');
        if (lineObj) lineObj.visible = hitting;
      }
    });

    // ── Snap turn + step back component ──────────────────────────
    AFRAME.registerComponent('snap-turn', {
      schema: {
        angle:    { default: 30 },
        stepDist: { default: 1.5 },
        threshold: { default: 0.7 }
      },
      init: function () {
        this.rig    = document.getElementById('rig');
        this.readyX = true;
        this.readyY = true;

        this.el.addEventListener('thumbstickmoved', (evt) => {
          const x = evt.detail.x;
          const y = evt.detail.y;

          // Left / right → snap turn
          if (Math.abs(x) > this.data.threshold && this.readyX) {
            this.readyX = false;
            const snap = THREE.MathUtils.degToRad(this.data.angle);
            this.rig.object3D.rotation.y += x > 0 ? -snap : snap;
          }
          if (Math.abs(x) < 0.2) this.readyX = true;

          // Down → step back
          if (y > this.data.threshold && this.readyY) {
            this.readyY = false;
            const ry   = this.rig.object3D.rotation.y;
            const dist = this.data.stepDist;
            const nx   = this.rig.object3D.position.x + Math.sin(ry) * dist;
            const nz   = this.rig.object3D.position.z + Math.cos(ry) * dist;
            this.rig.object3D.position.x = Math.max(-4.6, Math.min(4.6, nx));
            this.rig.object3D.position.z = Math.max(-4.6, Math.min(4.6, nz));
          }
          if (y < 0.2) this.readyY = true;
        });
      }
    });

    // ── Room collider component ───────────────────────────────────
    AFRAME.registerComponent('room-collider', {
      tick: function () {
        const pos = this.el.object3D.position;
        const limit = 4.6;
        if (pos.x >  limit) pos.x =  limit;
        if (pos.x < -limit) pos.x = -limit;
        if (pos.z >  limit) pos.z =  limit;
        if (pos.z < -limit) pos.z = -limit;
      }
    });

    // ── Room data ─────────────────────────────────────────────────
    let rooms = [
      { id: 'room1', name: 'Blue Room',  color: '#5B9BD5', floorColor: '#4682B4' },
      { id: 'room2', name: 'Green Room', color: '#32CD32', floorColor: '#228B22' },
      { id: 'room3', name: 'Red Room',   color: '#DC143C', floorColor: '#8B0000' },
    ];
    let activeRoomId = 'room1';
    let roomCounter = 4;

    function darken(hex) {
      const r = Math.round(parseInt(hex.slice(1,3),16) * 0.75);
      const g = Math.round(parseInt(hex.slice(3,5),16) * 0.75);
      const b = Math.round(parseInt(hex.slice(5,7),16) * 0.75);
      return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
    }

    // ── Scene rendering ───────────────────────────────────────────
    function renderScene() {
      renderRooms();
      renderMenuPanel();
    }

    function renderRooms() {
      const container = document.getElementById('rooms-container');
      while (container.firstChild) container.removeChild(container.firstChild);

      rooms.forEach(room => {
        const entity = document.createElement('a-entity');
        entity.setAttribute('id', room.id);
        entity.setAttribute('visible', room.id === activeRoomId);

        const floor = document.createElement('a-plane');
        floor.setAttribute('class', 'floor');
        floor.setAttribute('position', '0 0 0');
        floor.setAttribute('rotation', '-90 0 0');
        floor.setAttribute('width', '10');
        floor.setAttribute('height', '10');
        floor.setAttribute('color', room.floorColor);
        entity.appendChild(floor);

        const wallDefs = [
          { pos: '0 2 -5',  rot: '0 0 0' },
          { pos: '5 2 0',   rot: '0 90 0' },
          { pos: '-5 2 0',  rot: '0 90 0' },
          { pos: '0 2 5',   rot: '0 0 0' },
        ];
        wallDefs.forEach(w => {
          const wall = document.createElement('a-box');
          wall.setAttribute('position', w.pos);
          wall.setAttribute('rotation', w.rot);
          wall.setAttribute('width', '10');
          wall.setAttribute('height', '4');
          wall.setAttribute('depth', '0.2');
          wall.setAttribute('color', room.color);
          entity.appendChild(wall);
        });

        const label = document.createElement('a-text');
        label.setAttribute('id', `${room.id}-label`);
        label.setAttribute('value', room.name.toUpperCase());
        label.setAttribute('position', '0 3 -4.8');
        label.setAttribute('align', 'center');
        label.setAttribute('color', '#FFF');
        label.setAttribute('width', '8');
        entity.appendChild(label);

        const modelsContainer = document.createElement('a-entity');
        modelsContainer.setAttribute('id', `${room.id}-models`);
        entity.appendChild(modelsContainer);

        container.appendChild(entity);
      });
    }

    function renderMenuPanel() {
      const panel = document.getElementById('menu-panel');
      while (panel.firstChild) panel.removeChild(panel.firstChild);

      const n = rooms.length;
      const btnH = 0.5;
      const gap = 0.15;
      const panelH = 0.5 + n * (btnH + gap) + gap;

      const bg = document.createElement('a-box');
      bg.setAttribute('width', '2');
      bg.setAttribute('height', panelH.toString());
      bg.setAttribute('depth', '0.1');
      bg.setAttribute('color', '#2C3E50');
      bg.setAttribute('opacity', '0.9');
      panel.appendChild(bg);

      const title = document.createElement('a-text');
      title.setAttribute('value', 'ROOMS');
      title.setAttribute('position', `0 ${(panelH / 2 - 0.25).toFixed(2)} 0.06`);
      title.setAttribute('align', 'center');
      title.setAttribute('color', '#FFF');
      title.setAttribute('width', '3');
      panel.appendChild(title);

      rooms.forEach((room, i) => {
        const y = (panelH / 2 - 0.55 - i * (btnH + gap)).toFixed(2);

        const btn = document.createElement('a-box');
        btn.setAttribute('data-room', room.id);
        btn.setAttribute('position', `0 ${y} 0.06`);
        btn.setAttribute('width', '1.6');
        btn.setAttribute('height', btnH.toString());
        btn.setAttribute('depth', '0.05');
        btn.setAttribute('color', room.color);
        btn.addEventListener('click', () => switchRoom(room.id));
        btn.addEventListener('mouseenter', () => btn.setAttribute('opacity', '0.7'));
        btn.addEventListener('mouseleave', () => btn.setAttribute('opacity', '1'));
        panel.appendChild(btn);

        const lbl = document.createElement('a-text');
        lbl.setAttribute('value', room.name);
        lbl.setAttribute('position', `0 ${y} 0.12`);
        lbl.setAttribute('align', 'center');
        lbl.setAttribute('color', '#FFF');
        lbl.setAttribute('width', '3');
        panel.appendChild(lbl);
      });
    }

    function switchRoom(id) {
      activeRoomId = id;
      rooms.forEach(r => {
        const el = document.getElementById(r.id);
        if (el) el.setAttribute('visible', r.id === id);
      });
    }

    // ── Editor: room management ───────────────────────────────────
    function renderRoomsList() {
      const list = document.getElementById('roomsList');
      list.innerHTML = '';
      rooms.forEach(room => {
        const item = document.createElement('div');
        item.className = 'room-item';
        item.innerHTML = `
          <div class="room-color-dot" style="background:${room.color}"></div>
          <input class="room-name-input" type="text" value="${room.name}" id="name-${room.id}">
          <button class="room-rename-btn" onclick="renameRoom('${room.id}')">Rename</button>
          <button class="room-delete-btn" onclick="deleteRoom('${room.id}')">Delete</button>
        `;
        list.appendChild(item);
      });
    }

    function renderRoomSelect() {
      const sel = document.getElementById('roomSelect');
      const current = sel.value;
      sel.innerHTML = '';
      rooms.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r.id;
        opt.textContent = r.name;
        sel.appendChild(opt);
      });
      if (rooms.find(r => r.id === current)) sel.value = current;
    }

    function createRoom() {
      const nameInput = document.getElementById('newRoomName');
      const colorInput = document.getElementById('newRoomColor');
      const name = nameInput.value.trim() || `Room ${roomCounter}`;
      const color = colorInput.value;
      const id = `room${roomCounter++}`;

      rooms.push({ id, name, color, floorColor: darken(color) });
      nameInput.value = '';

      renderScene();
      renderRoomsList();
      renderRoomSelect();
      showStatus(`Room "${name}" created.`, false);
    }

    function deleteRoom(id) {
      const room = rooms.find(r => r.id === id);
      rooms = rooms.filter(r => r.id !== id);
      loadedModels = loadedModels.filter(m => m.room !== id);

      if (activeRoomId === id) activeRoomId = rooms.length ? rooms[0].id : null;

      renderScene();
      renderRoomsList();
      renderRoomSelect();
      renderModelsList();
      showStatus(`Room "${room.name}" deleted.`, false);
    }

    function renameRoom(id) {
      const input = document.getElementById(`name-${id}`);
      const newName = input.value.trim();
      if (!newName) return;

      const room = rooms.find(r => r.id === id);
      room.name = newName;

      // Update scene label and menu
      const label = document.getElementById(`${id}-label`);
      if (label) label.setAttribute('value', newName.toUpperCase());
      renderMenuPanel();
      renderRoomsList();
      renderRoomSelect();
      showStatus(`Renamed to "${newName}".`, false);
    }

    // ── Editor panel toggle ───────────────────────────────────────
    function toggleEditor() {
      document.getElementById('editor-panel').classList.toggle('open');
    }

    // ── Model upload ──────────────────────────────────────────────
    let modelCounter = 0;
    let currentFile = null;
    let loadedModels = [];

    const dropArea       = document.getElementById('dropArea');
    const fileInput      = document.getElementById('fileInput');
    const fileInfo       = document.getElementById('fileInfo');
    const fileNameEl     = document.getElementById('fileName');
    const addModelBtn    = document.getElementById('addModelBtn');
    const clearAllBtn    = document.getElementById('clearAllBtn');
    const scaleSlider    = document.getElementById('scaleSlider');
    const scaleValue     = document.getElementById('scaleValue');
    const rotationSlider = document.getElementById('rotationSlider');
    const rotationValue  = document.getElementById('rotationValue');
    const statusMessage  = document.getElementById('statusMessage');
    const modelsList     = document.getElementById('modelsList');

    dropArea.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', e => handleFile(e.target.files[0]));
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault();
      dropArea.classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });

    function handleFile(file) {
      if (!file) return;
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['stl', 'obj', 'gltf', 'glb'].includes(ext)) {
        showStatus('Unsupported file. Use STL, OBJ, GLTF or GLB.', true);
        return;
      }
      currentFile = file;
      fileNameEl.textContent = file.name;
      fileInfo.classList.add('active');
      addModelBtn.disabled = false;
      showStatus('File ready.', false);
    }

    scaleSlider.addEventListener('input', e => scaleValue.textContent = e.target.value);
    rotationSlider.addEventListener('input', e => rotationValue.textContent = e.target.value + '°');

    addModelBtn.addEventListener('click', () => {
      if (!currentFile) return;
      const reader = new FileReader();
      reader.onload = e => {
        const modelData = {
          fileData: e.target.result,
          fileName: currentFile.name,
          fileType: currentFile.name.split('.').pop().toLowerCase()
        };
        const settings = {
          room: document.getElementById('roomSelect').value,
          position: {
            x: parseFloat(document.getElementById('posX').value),
            y: parseFloat(document.getElementById('posY').value),
            z: parseFloat(document.getElementById('posZ').value)
          },
          scale: parseFloat(scaleSlider.value),
          rotationY: parseFloat(rotationSlider.value),
          color: document.getElementById('colorPicker').value
        };
        addModelToScene(modelData, settings);
        showStatus('Model added!', false);
      };
      reader.readAsArrayBuffer(currentFile);
    });

    clearAllBtn.addEventListener('click', () => {
      if (!confirm('Remove all models from all rooms?')) return;
      rooms.forEach(r => {
        const c = document.getElementById(`${r.id}-models`);
        if (c) while (c.firstChild) c.removeChild(c.firstChild);
      });
      loadedModels = [];
      renderModelsList();
      showStatus('All models cleared.', false);
    });

    function addModelToScene(modelData, settings) {
      const { fileData, fileName, fileType } = modelData;
      const { room, position, scale, rotationY, color } = settings;
      const modelId = `model-${modelCounter++}`;
      const container = document.getElementById(`${room}-models`);
      if (!container) return;

      let entity;

      if (fileType === 'obj') {
        const url = URL.createObjectURL(new Blob([fileData], { type: 'text/plain' }));
        entity = document.createElement('a-entity');
        entity.setAttribute('obj-model', `obj: url(${url})`);
        entity.setAttribute('material', `color: ${color}`);
      } else if (fileType === 'gltf' || fileType === 'glb') {
        const type = fileType === 'glb' ? 'model/gltf-binary' : 'model/gltf+json';
        const url = URL.createObjectURL(new Blob([fileData], { type }));
        entity = document.createElement('a-entity');
        entity.setAttribute('gltf-model', `url(${url})`);
      } else {
        entity = document.createElement('a-entity');
        entity.setAttribute('geometry', 'primitive: box');
        entity.setAttribute('material', `color: ${color}`);
      }

      entity.setAttribute('id', modelId);
      entity.setAttribute('position', `${position.x} ${position.y} ${position.z}`);
      entity.setAttribute('rotation', `0 ${rotationY} 0`);
      entity.setAttribute('scale', `${scale} ${scale} ${scale}`);
      container.appendChild(entity);

      loadedModels.push({ id: modelId, name: fileName, room });
      renderModelsList();
    }

    function removeModel(modelId) {
      const el = document.getElementById(modelId);
      if (el) el.remove();
      loadedModels = loadedModels.filter(m => m.id !== modelId);
      renderModelsList();
      showStatus('Model removed.', false);
    }

    function renderModelsList() {
      if (loadedModels.length === 0) {
        modelsList.innerHTML = '<p style="color:#7f8c8d;text-align:center;font-size:13px;">No models loaded yet</p>';
        return;
      }
      modelsList.innerHTML = '';
      loadedModels.forEach(model => {
        const roomName = (rooms.find(r => r.id === model.room) || {}).name || model.room;
        const item = document.createElement('div');
        item.className = 'model-item';
        item.innerHTML = `
          <span class="model-item-name" title="${model.name}">${model.name} <small style="color:#999">(${roomName})</small></span>
          <button class="model-item-remove" onclick="removeModel('${model.id}')">Remove</button>
        `;
        modelsList.appendChild(item);
      });
    }

    function showStatus(msg, isError) {
      statusMessage.textContent = msg;
      statusMessage.classList.add('active');
      statusMessage.classList.toggle('error', isError);
      setTimeout(() => statusMessage.classList.remove('active'), 3000);
    }

    // ── Init ──────────────────────────────────────────────────────
    document.querySelector('a-scene').addEventListener('loaded', () => {
      renderScene();
      renderRoomsList();
      renderRoomSelect();
    });
  </script>
</body>
</html>
