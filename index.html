<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>A-Frame Demo</title>
  <meta name="description" content="A-Frame VR Demo">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
</head>
<body>
  <a-scene background="color: #f5c518">
    <!-- Sky -->
    <a-sky color="#1a1a2e"></a-sky>
    
    <!-- Ground -->
    <a-plane position="0 0 0" rotation="-90 0 0" width="50" height="50" color="#white"></a-plane>
    
    <!-- Red Box -->
    <a-box position="-2 1.5 -5" color="#0f3460" animation="property: position; to: -2 2.5 -5; dur: 1000; easing: easeInOutSine; loop: true; dir: alternate"></a-box>
    
    <!-- Green Sphere -->
    <a-sphere position="0 1.5 -5" color="#0f3460" radius="0.8" animation="property: rotation; to: 0 360 0; dur: 3000; loop: true"></a-sphere>
    
    <!-- Yellow Cone -->
    <a-cone position="2 1 -5" color="#f5c518" radius-bottom="0.5" radius-top="0"></a-cone>

    <a-cone position="8 1 -5" color="#f5c518" radius-bottom="0.5" radius-top="0"></a-cone>
    
    <!-- Text -->
    <a-text value="Hello A-Frame!" position="0 3.5 -5" align="center" color="#ffffff" width="6"></a-text>
    
    <!-- Lights -->
    <a-light type="ambient" color="#404040"></a-light>
    <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>
    
    <!-- Camera Rig -->
    <a-entity position="0 1.6 0">
      <a-camera>
        <a-cursor color="#e94560"></a-cursor>
      </a-camera>
    </a-entity>
  </a-scene>
</body>
</html>
